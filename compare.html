    <script src="js/config.js"></script>
    <script src="js/platform-header.js"></script>
    <script>
        (function() {
            'use strict';

            var currentMode = 'compare'; // 'compare' | 'verify'
            var sidebarOpen = true;
            var sidebarWidth = 280; // px, 리사이즈 가능
            var SIDEBAR_MIN = 180;
            var SIDEBAR_MAX = 450;
            var API_BASE = (window.DISPLAY_CONFIG && DISPLAY_CONFIG.API_BASE) || 'http://localhost:8000/api';

            // ── 문서 상태 ──
            var docState = {
                a: { file: null, text: null, paragraphs: [], filename: '' },
                b: { file: null, text: null, paragraphs: [], filename: '' }
            };

            // ── DOM 참조 ──
            var compareMain = document.getElementById('compare-main');
            var cpPanels = document.getElementById('cp-panels');
            var panelA = document.getElementById('panel-a');
            var panelB = document.getElementById('panel-b');
            var panelBodyA = document.getElementById('panel-body-a');
            var panelBodyB = document.getElementById('panel-body-b');
            var sidebar = document.getElementById('cp-sidebar');
            var sidebarTitle = document.getElementById('cp-sidebar-title');
            var sidebarEmpty = document.getElementById('cp-sidebar-empty');
            var sidebarCollapse = document.getElementById('cp-sidebar-collapse');
            var sidebarRestore = document.getElementById('cp-sidebar-restore');
            var resizeHandle = document.getElementById('cp-resize-handle');
            var labelA = document.getElementById('label-text-a');
            var labelB = document.getElementById('label-text-b');
            var fileInputA = document.getElementById('file-input-a');
            var fileInputB = document.getElementById('file-input-b');
            var fileRemoveA = document.getElementById('file-remove-a');
            var fileRemoveB = document.getElementById('file-remove-b');
            var scrollSyncBtn = document.getElementById('scroll-sync-btn');

            // Scroll sync (기본 OFF — 비교 시 독립 스크롤이 기본)
            var scrollSyncEnabled = false;
            var scrollSyncing = false;

            // ── 모드 토글 빌드 ──
            var modeToggle = document.createElement('div');
            modeToggle.className = 'mode-toggle';

            var btnCompare = document.createElement('button');
            btnCompare.className = 'mode-toggle-btn active';
            btnCompare.type = 'button';
            btnCompare.textContent = '비교';

            var btnVerify = document.createElement('button');
            btnVerify.className = 'mode-toggle-btn';
            btnVerify.type = 'button';
            btnVerify.textContent = '검증';

            modeToggle.appendChild(btnCompare);
            modeToggle.appendChild(btnVerify);

            // ── 유틸리티 ──
            function escapeHTML(str) {
                var div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getPanel(side) { return side === 'a' ? panelBodyA : panelBodyB; }
            function getPanelRoot(side) { return side === 'a' ? panelA : panelB; }
            function getLabel(side) { return side === 'a' ? labelA : labelB; }
            function getRemoveBtn(side) { return side === 'a' ? fileRemoveA : fileRemoveB; }
            function getFileInput(side) { return side === 'a' ? fileInputA : fileInputB; }

            // ── Placeholder HTML ──
            var PLACEHOLDER_SVG = '<svg class="panel-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>';

            function getDefaultLabel(side) {
                if (side === 'a') return currentMode === 'verify' ? '검증 문서' : '문서 A';
                return '문서 B';
            }

            var UPLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
            var PASTE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>';

            function makePlaceholderHTML(side) {
                return '<div class="panel-placeholder" id="placeholder-' + side + '">'
                    + PLACEHOLDER_SVG
                    + '<span class="panel-placeholder-desc">파일을 드래그하거나</span>'
                    + '<button class="placeholder-upload-btn" data-action="upload" data-side="' + side + '">'
                    + UPLOAD_ICON + ' 파일 선택</button>'
                    + '<span class="placeholder-or">또는</span>'
                    + '<button class="placeholder-paste-link" data-action="paste" data-side="' + side + '">'
                    + PASTE_ICON + ' 텍스트 붙여넣기</button>'
                    + '<span class="placeholder-hint">.docx, .pdf 지원</span>'
                    + '</div>';
            }

            // ── 패널 콘텐츠 렌더링 ──
            function renderParagraphs(panel, paragraphs) {
                // placeholder 제거, 텍스트 콘텐츠 삽입
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var old = panel.querySelector('.cp-text-content');
                if (old) old.remove();

                var html = '<div class="cp-text-content">';
                for (var i = 0; i < paragraphs.length; i++) {
                    html += '<div class="cp-paragraph" data-index="' + i + '">'
                        + escapeHTML(paragraphs[i]) + '</div>';
                }
                html += '</div>';
                panel.insertAdjacentHTML('beforeend', html);
            }

            function showLoading(panel) {
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                panel.insertAdjacentHTML('beforeend',
                    '<div class="cp-upload-loading">'
                    + '<div class="cp-upload-spinner"></div>'
                    + '<span>텍스트 추출 중...</span></div>');
            }

            function restorePlaceholder(side) {
                var panel = getPanel(side);
                var label = getLabel(side);
                var removeBtn = getRemoveBtn(side);

                // 기존 콘텐츠 제거 (label, remove 버튼 제외)
                var content = panel.querySelector('.cp-text-content');
                if (content) content.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                var oldPh = panel.querySelector('.panel-placeholder');
                if (oldPh) oldPh.remove();

                // placeholder 삽입
                panel.insertAdjacentHTML('beforeend', makePlaceholderHTML(side));
                bindPlaceholderEvents(side);

                // 상태 초기화
                docState[side] = { file: null, text: null, paragraphs: [], filename: '' };
                label.textContent = getDefaultLabel(side);
                label.title = '';
                removeBtn.classList.remove('visible');
                clearDiff();
            }

            // ── Diff 상태 ──
            var diffState = {
                changes: [],
                currentIndex: -1,
                filter: { added: true, deleted: true, modified: true },
                ignoreWhitespace: false
            };

            var editMode = false;

            // ── Diff DOM 참조 ──
            var navGroup = document.getElementById('cp-nav-group');
            var navPrev = document.getElementById('nav-prev');
            var navNext = document.getElementById('nav-next');
            var navIndicator = document.getElementById('nav-indicator');
            var swapBtn = document.getElementById('swap-btn');
            var editToggleBtn = document.getElementById('edit-toggle-btn');
            var filterGroup = document.getElementById('cp-filter-group');
            var filterBtn = document.getElementById('filter-btn');
            var filterDropdown = document.getElementById('cp-filter-dropdown');
            var sidebarBody = document.getElementById('cp-sidebar-body');

            // ── 문서 로드 완료 처리 ──
            function onDocumentLoaded(side, filename, paragraphs) {
                var panel = getPanel(side);
                var label = getLabel(side);
                var removeBtn = getRemoveBtn(side);

                docState[side] = {
                    file: null,
                    text: paragraphs.join('\n'),
                    paragraphs: paragraphs,
                    filename: filename
                };

                label.textContent = filename;
                label.title = filename;
                removeBtn.classList.add('visible');
                renderParagraphs(panel, paragraphs);
                tryRunDiff();
            }

            // ── 파일 업로드 처리 ──
            function uploadFile(side, file) {
                if (!file) return;

                var ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'docx' && ext !== 'pdf') {
                    alert('지원하지 않는 형식입니다.\n허용: .docx, .pdf');
                    return;
                }

                var panel = getPanel(side);
                showLoading(panel);

                var formData = new FormData();
                formData.append('file', file);

                fetch(API_BASE + '/compare/upload', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                })
                .then(function(res) {
                    if (!res.ok) {
                        return res.json().then(function(err) {
                            throw new Error(err.detail || '업로드 실패');
                        });
                    }
                    return res.json();
                })
                .then(function(data) {
                    onDocumentLoaded(side, data.filename, data.paragraphs);
                })
                .catch(function(err) {
                    restorePlaceholder(side);
                    alert('업로드 오류: ' + err.message);
                });
            }

            // ── 텍스트 붙여넣기 모드 ──
            function showPasteMode(side) {
                var panel = getPanel(side);

                // placeholder 제거
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();

                var html = '<div class="cp-paste-container">'
                    + '<div class="cp-paste-header">'
                    + '<span class="cp-paste-hint">텍스트를 붙여넣으세요 (Ctrl+V)</span>'
                    + '<button class="cp-paste-btn" data-paste-cancel="' + side + '">취소</button>'
                    + '<button class="cp-paste-btn primary" data-paste-confirm="' + side + '">확인</button>'
                    + '</div>'
                    + '<textarea class="cp-paste-textarea" id="paste-textarea-' + side + '" placeholder="여기에 텍스트를 붙여넣으세요..."></textarea>'
                    + '</div>';
                panel.insertAdjacentHTML('beforeend', html);

                // textarea 포커스
                var textarea = document.getElementById('paste-textarea-' + side);
                if (textarea) textarea.focus();
            }

            function confirmPaste(side) {
                var textarea = document.getElementById('paste-textarea-' + side);
                if (!textarea) return;

                var text = textarea.value.trim();
                if (!text) {
                    alert('텍스트를 입력해주세요.');
                    return;
                }

                // 단락 분리: 빈 줄 기준, 없으면 줄바꿈 기준
                var paragraphs;
                if (text.indexOf('\n\n') !== -1) {
                    paragraphs = text.split(/\n\n+/);
                } else {
                    paragraphs = text.split(/\n/);
                }
                paragraphs = paragraphs.filter(function(p) { return p.trim(); });

                if (paragraphs.length === 0) {
                    alert('텍스트를 입력해주세요.');
                    return;
                }

                onDocumentLoaded(side, '붙여넣기 텍스트', paragraphs);
            }

            function cancelPaste(side) {
                restorePlaceholder(side);
            }

            // ── 이벤트 위임: placeholder 버튼 + paste 버튼 ──
            cpPanels.addEventListener('click', function(e) {
                var btn = e.target.closest('[data-action]');
                if (btn) {
                    var action = btn.getAttribute('data-action');
                    var side = btn.getAttribute('data-side');
                    if (action === 'upload') {
                        getFileInput(side).click();
                    } else if (action === 'paste') {
                        showPasteMode(side);
                    }
                    return;
                }

                var confirmBtn = e.target.closest('[data-paste-confirm]');
                if (confirmBtn) {
                    confirmPaste(confirmBtn.getAttribute('data-paste-confirm'));
                    return;
                }

                var cancelBtn = e.target.closest('[data-paste-cancel]');
                if (cancelBtn) {
                    cancelPaste(cancelBtn.getAttribute('data-paste-cancel'));
                    return;
                }
            });

            // ── Drag & Drop 바인딩 ──
            function bindPlaceholderEvents(side) {
                var placeholder = document.getElementById('placeholder-' + side);
                if (!placeholder) return;

                placeholder.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    placeholder.classList.add('dragover');
                });

                placeholder.addEventListener('dragleave', function() {
                    placeholder.classList.remove('dragover');
                });

                placeholder.addEventListener('drop', function(e) {
                    e.preventDefault();
                    placeholder.classList.remove('dragover');
                    var files = e.dataTransfer.files;
                    if (files.length > 0) uploadFile(side, files[0]);
                });
            }

            // 패널 전체에 drag-drop (파일 교체 지원)
            function bindPanelDragDrop(side) {
                var panel = getPanel(side);

                panel.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    var placeholder = document.getElementById('placeholder-' + side);
                    if (placeholder) placeholder.classList.add('dragover');
                });

                panel.addEventListener('dragleave', function(e) {
                    // 패널 밖으로 나갔을 때만
                    if (!panel.contains(e.relatedTarget)) {
                        var placeholder = document.getElementById('placeholder-' + side);
                        if (placeholder) placeholder.classList.remove('dragover');
                    }
                });

                panel.addEventListener('drop', function(e) {
                    e.preventDefault();
                    var placeholder = document.getElementById('placeholder-' + side);
                    if (placeholder) placeholder.classList.remove('dragover');
                    var files = e.dataTransfer.files;
                    if (files.length > 0) uploadFile(side, files[0]);
                });
            }

            // file input change 이벤트
            fileInputA.addEventListener('change', function() {
                if (fileInputA.files.length > 0) uploadFile('a', fileInputA.files[0]);
                fileInputA.value = '';
            });
            fileInputB.addEventListener('change', function() {
                if (fileInputB.files.length > 0) uploadFile('b', fileInputB.files[0]);
                fileInputB.value = '';
            });

            // 파일 제거 버튼
            fileRemoveA.addEventListener('click', function() { restorePlaceholder('a'); });
            fileRemoveB.addEventListener('click', function() { restorePlaceholder('b'); });

            // 초기 이벤트 바인딩
            bindPlaceholderEvents('a');
            bindPlaceholderEvents('b');
            bindPanelDragDrop('a');
            bindPanelDragDrop('b');

            // ── 그리드 레이아웃 갱신 ──
            function updateGrid() {
                if (sidebarOpen) {
                    compareMain.style.gridTemplateColumns = '1fr 4px ' + sidebarWidth + 'px';
                    resizeHandle.style.display = '';
                } else {
                    compareMain.style.gridTemplateColumns = '1fr 0 0';
                    resizeHandle.style.display = 'none';
                }
            }

            // ── 모드 전환 ──
            function setMode(mode) {
                if (mode === currentMode) return;
                currentMode = mode;

                var body = document.getElementById('compare-body');
                body.className = 'compare-body mode-' + mode;

                btnCompare.classList.toggle('active', mode === 'compare');
                btnVerify.classList.toggle('active', mode === 'verify');

                // 툴바 힌트 변경
                var hint = document.getElementById('toolbar-hint');
                if (mode === 'compare') {
                    hint.textContent = '문서 두 개를 업로드하여 비교하세요';
                } else {
                    hint.textContent = '문서를 업로드하여 규칙을 검증하세요';
                }

                // 라벨 변경 (파일이 로드된 경우 파일명 유지)
                if (!docState.a.filename) {
                    labelA.textContent = getDefaultLabel('a');
                }
                if (!docState.b.filename) {
                    labelB.textContent = getDefaultLabel('b');
                }

                // placeholder 텍스트 변경 (파일이 없을 때만)
                var phTextA = panelBodyA.querySelector('.panel-placeholder-text');
                if (phTextA) {
                    phTextA.textContent = getDefaultLabel('a');
                }

                // 사이드바 타이틀/빈 메시지 변경
                if (mode === 'compare') {
                    sidebarTitle.textContent = '변경 목록';
                    sidebarEmpty.textContent = '비교 결과가 여기에 표시됩니다';
                } else {
                    sidebarTitle.textContent = '검증 결과';
                    sidebarEmpty.textContent = '검증 결과가 여기에 표시됩니다';
                }

                updateGrid();
            }

            btnCompare.addEventListener('click', function() { setMode('compare'); });
            btnVerify.addEventListener('click', function() { setMode('verify'); });

            // 초기 모드 적용
            document.getElementById('compare-body').classList.add('mode-compare');

            // ── 사이드바 접기/펼치기 ──
            function collapseSidebar() {
                sidebarOpen = false;
                sidebar.style.overflow = 'hidden';
                sidebarRestore.classList.add('visible');
                updateGrid();
            }

            function expandSidebar() {
                sidebarOpen = true;
                sidebar.style.overflow = '';
                sidebarRestore.classList.remove('visible');
                updateGrid();
            }

            sidebarCollapse.addEventListener('click', collapseSidebar);
            sidebarRestore.addEventListener('click', expandSidebar);

            // ── 사이드바 리사이즈 핸들 (Explorer 패턴) ──
            (function() {
                var isResizing = false;

                resizeHandle.addEventListener('mousedown', function(e) {
                    if (!sidebarOpen) return;
                    isResizing = true;
                    resizeHandle.classList.add('dragging');
                    document.body.classList.add('cp-resizing');
                    e.preventDefault();
                });

                document.addEventListener('mousemove', function(e) {
                    if (!isResizing) return;
                    var rect = compareMain.getBoundingClientRect();
                    var newWidth = rect.right - e.clientX;
                    newWidth = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, newWidth));
                    sidebarWidth = newWidth;
                    updateGrid();
                });

                document.addEventListener('mouseup', function() {
                    if (isResizing) {
                        isResizing = false;
                        resizeHandle.classList.remove('dragging');
                        document.body.classList.remove('cp-resizing');
                    }
                });
            })();

            // ── 테마 토글 ──
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.body.setAttribute('data-theme', 'dark');
                } else {
                    document.body.removeAttribute('data-theme');
                }
            }

            function toggleTheme() {
                var isDark = document.body.getAttribute('data-theme') === 'dark';
                var next = isDark ? 'light' : 'dark';
                applyTheme(next);
                try { localStorage.setItem('theme', next); } catch(e) {}
            }

            // 저장된 테마 복원
            try {
                var saved = localStorage.getItem('theme');
                if (saved) applyTheme(saved);
            } catch(e) {}

            // ── 헤더 초기화 ──
            var headerResult = initPlatformHeader({
                title: 'Document Compare',
                currentSystem: 'compare',
                navItems: [],
                showThemeToggle: true,
                onAuth: function(user) {
                    document.body.style.visibility = 'visible';
                }
            });

            // 모드 토글을 툴바 끝에 삽입
            var toolbar = document.getElementById('compare-toolbar');
            toolbar.appendChild(modeToggle);

            // 테마 토글 이벤트
            if (headerResult.themeToggle) {
                headerResult.themeToggle.addEventListener('click', toggleTheme);
            }

            // ── 스크롤 동기화 ──
            scrollSyncBtn.addEventListener('click', function() {
                scrollSyncEnabled = !scrollSyncEnabled;
                scrollSyncBtn.classList.toggle('active', scrollSyncEnabled);
            });

            function syncScroll(source, target) {
                if (!scrollSyncEnabled || scrollSyncing) return;
                scrollSyncing = true;
                var maxS = source.scrollHeight - source.clientHeight;
                var maxT = target.scrollHeight - target.clientHeight;
                if (maxS > 0 && maxT > 0) {
                    var ratio = source.scrollTop / maxS;
                    target.scrollTop = ratio * maxT;
                }
                scrollSyncing = false;
            }

            panelBodyA.addEventListener('scroll', function() { syncScroll(panelBodyA, panelBodyB); });
            panelBodyB.addEventListener('scroll', function() { syncScroll(panelBodyB, panelBodyA); });

            // ══════════════════════════════════════════
            // Phase 2: Diff 엔진 + 시각화 + 사이드바 + 네비게이션 + 편집 + 필터
            // ══════════════════════════════════════════

            // ── 2-1. Diff 엔진 ──
            function normalizeText(text) {
                if (!diffState.ignoreWhitespace) return text;
                return text.replace(/\s+/g, ' ').trim();
            }

            // 유사도 계산 (0~1): 공통 단어 비율
            function similarity(a, b) {
                var wordsA = a.split(/\s+/);
                var wordsB = b.split(/\s+/);
                if (wordsA.length === 0 && wordsB.length === 0) return 1;
                if (wordsA.length === 0 || wordsB.length === 0) return 0;
                var setB = {};
                wordsB.forEach(function(w) { setB[w] = (setB[w] || 0) + 1; });
                var common = 0;
                wordsA.forEach(function(w) {
                    if (setB[w] > 0) { common++; setB[w]--; }
                });
                return (2 * common) / (wordsA.length + wordsB.length);
            }

            function computeDiff() {
                var parasA = docState.a.paragraphs;
                var parasB = docState.b.paragraphs;

                // Level 1: 단락 정렬 (diffArrays)
                var normA = parasA.map(normalizeText);
                var normB = parasB.map(normalizeText);
                var arrayDiff = Diff.diffArrays(normA, normB);

                // 중간 결과 수집 (removed/added 연속 구간을 페어링하기 위해)
                var rawChanges = [];
                var idxA = 0, idxB = 0;

                for (var i = 0; i < arrayDiff.length; i++) {
                    var part = arrayDiff[i];
                    if (part.added) {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'added', idxA: null, idxB: idxB++ });
                        }
                    } else if (part.removed) {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'deleted', idxA: idxA++, idxB: null });
                        }
                    } else {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'equal', idxA: idxA++, idxB: idxB++ });
                        }
                    }
                }

                // Level 2: 인접 deleted+added 페어링 → modified 변환
                var SIMILARITY_THRESHOLD = 0.5;
                var changes = [];

                var k = 0;
                while (k < rawChanges.length) {
                    var rc = rawChanges[k];

                    if (rc.type === 'equal') {
                        // equal — 원문이 다를 수 있음 (공백 무시 시)
                        var tA = parasA[rc.idxA];
                        var tB = parasB[rc.idxB];
                        if (tA !== tB) {
                            var wordDiffs = Diff.diffWords(
                                diffState.ignoreWhitespace ? normalizeText(tA) : tA,
                                diffState.ignoreWhitespace ? normalizeText(tB) : tB
                            );
                            var hasChange = wordDiffs.some(function(w) { return w.added || w.removed; });
                            if (hasChange) {
                                changes.push({
                                    type: 'modified', indexA: rc.idxA, indexB: rc.idxB,
                                    textA: tA, textB: tB, wordDiffs: wordDiffs,
                                    summary: tA.substring(0, 60)
                                });
                            }
                        }
                        k++;
                        continue;
                    }

                    // 연속된 deleted + added 수집
                    var dels = [], adds = [];
                    while (k < rawChanges.length && (rawChanges[k].type === 'deleted' || rawChanges[k].type === 'added')) {
                        if (rawChanges[k].type === 'deleted') dels.push(rawChanges[k]);
                        else adds.push(rawChanges[k]);
                        k++;
                    }

                    // 페어링: 유사한 deleted-added 쌍을 modified로
                    var usedDel = {}, usedAdd = {};
                    var pairs = [];

                    for (var di = 0; di < dels.length; di++) {
                        var bestSim = 0, bestAi = -1;
                        for (var ai = 0; ai < adds.length; ai++) {
                            if (usedAdd[ai]) continue;
                            var sim = similarity(parasA[dels[di].idxA], parasB[adds[ai].idxB]);
                            if (sim > bestSim) { bestSim = sim; bestAi = ai; }
                        }
                        if (bestSim >= SIMILARITY_THRESHOLD && bestAi >= 0) {
                            pairs.push({ di: di, ai: bestAi, sim: bestSim });
                            usedDel[di] = true;
                            usedAdd[bestAi] = true;
                        }
                    }

                    // 출력 순서: 원래 인덱스 순
                    var allEntries = [];
                    for (var di = 0; di < dels.length; di++) {
                        if (usedDel[di]) {
                            var pair = pairs.filter(function(p) { return p.di === di; })[0];
                            var tA = parasA[dels[di].idxA];
                            var tB = parasB[adds[pair.ai].idxB];
                            var wordDiffs = Diff.diffWords(
                                diffState.ignoreWhitespace ? normalizeText(tA) : tA,
                                diffState.ignoreWhitespace ? normalizeText(tB) : tB
                            );
                            allEntries.push({
                                sortKey: dels[di].idxA,
                                change: {
                                    type: 'modified', indexA: dels[di].idxA, indexB: adds[pair.ai].idxB,
                                    textA: tA, textB: tB, wordDiffs: wordDiffs,
                                    summary: tA.substring(0, 60)
                                }
                            });
                        } else {
                            allEntries.push({
                                sortKey: dels[di].idxA,
                                change: {
                                    type: 'deleted', indexA: dels[di].idxA, indexB: null,
                                    textA: parasA[dels[di].idxA], textB: null,
                                    wordDiffs: null, summary: parasA[dels[di].idxA]
                                }
                            });
                        }
                    }
                    for (var ai = 0; ai < adds.length; ai++) {
                        if (!usedAdd[ai]) {
                            allEntries.push({
                                sortKey: adds[ai].idxB + 0.5,  // added는 deleted 뒤에
                                change: {
                                    type: 'added', indexA: null, indexB: adds[ai].idxB,
                                    textA: null, textB: parasB[adds[ai].idxB],
                                    wordDiffs: null, summary: parasB[adds[ai].idxB]
                                }
                            });
                        }
                    }

                    allEntries.sort(function(a, b) { return a.sortKey - b.sortKey; });
                    for (var ei = 0; ei < allEntries.length; ei++) {
                        changes.push(allEntries[ei].change);
                    }
                }

                return changes;
            }

            function tryRunDiff() {
                if (currentMode !== 'compare') return;
                if (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0) {
                    runDiff();
                }
            }

            function runDiff() {
                diffState.changes = computeDiff();
                diffState.currentIndex = -1;
                renderDiffHighlights(diffState.changes);
                renderSidebar(diffState.changes);
                showDiffUI(true);
                updateNavigation();
            }

            function clearDiff() {
                diffState.changes = [];
                diffState.currentIndex = -1;

                // 패널 원래 렌더링 복원 (양쪽 모두 파일이 있는 경우)
                ['a', 'b'].forEach(function(side) {
                    if (docState[side].paragraphs.length > 0) {
                        renderParagraphs(getPanel(side), docState[side].paragraphs);
                    }
                });

                renderSidebar([]);
                showDiffUI(false);
                updateNavigation();
            }

            function showDiffUI(show) {
                navGroup.style.display = show ? '' : 'none';
                swapBtn.style.display = show ? '' : 'none';
                editToggleBtn.style.display = show ? '' : 'none';
                filterGroup.style.display = show ? '' : 'none';
                if (!show && editMode) toggleEditMode();
            }

            // ── 2-2. Diff 시각화 ──
            function renderDiffHighlights(changes) {
                var parasA = docState.a.paragraphs;
                var parasB = docState.b.paragraphs;

                // 단락별 매핑 구축
                var mapA = {}; // indexA → change
                var mapB = {}; // indexB → change
                var gapsA = []; // panel A에 삽입할 gap (added 항목)
                var gapsB = []; // panel B에 삽입할 gap (deleted 항목)

                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    c._changeIndex = i;
                    if (c.type === 'added') {
                        mapB[c.indexB] = c;
                    } else if (c.type === 'deleted') {
                        mapA[c.indexA] = c;
                    } else if (c.type === 'modified') {
                        mapA[c.indexA] = c;
                        mapB[c.indexB] = c;
                    }
                }

                // 양쪽 패널 동시 재구성
                // 전략: 두 문서의 인덱스를 동기 진행하면서 HTML 빌드
                var htmlA = '<div class="cp-text-content">';
                var htmlB = '<div class="cp-text-content">';

                var iA = 0, iB = 0;
                var changeOrder = buildChangeOrder(changes, parasA, parasB);

                for (var k = 0; k < changeOrder.length; k++) {
                    var entry = changeOrder[k];

                    if (entry.type === 'equal') {
                        htmlA += '<div class="cp-paragraph" data-index="' + entry.iA + '">' + escapeHTML(parasA[entry.iA]) + '</div>';
                        htmlB += '<div class="cp-paragraph" data-index="' + entry.iB + '">' + escapeHTML(parasB[entry.iB]) + '</div>';
                    } else if (entry.type === 'added') {
                        var c = entry.change;
                        var hidden = !diffState.filter.added ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-gap' + hidden + '" data-change-index="' + c._changeIndex + '"></div>';
                        htmlB += '<div class="cp-paragraph diff-para-added' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexB + '">' + escapeHTML(parasB[c.indexB]) + '</div>';
                    } else if (entry.type === 'deleted') {
                        var c = entry.change;
                        var hidden = !diffState.filter.deleted ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-para-deleted' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexA + '">' + escapeHTML(parasA[c.indexA]) + '</div>';
                        htmlB += '<div class="cp-paragraph diff-gap' + hidden + '" data-change-index="' + c._changeIndex + '"></div>';
                    } else if (entry.type === 'modified') {
                        var c = entry.change;
                        var hidden = !diffState.filter.modified ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-para-modified' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexA + '">' + renderWordDiffsA(c.wordDiffs) + '</div>';
                        htmlB += '<div class="cp-paragraph diff-para-modified' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexB + '">' + renderWordDiffsB(c.wordDiffs) + '</div>';
                    }
                }

                htmlA += '</div>';
                htmlB += '</div>';

                // 기존 콘텐츠 교체
                replaceContent(panelBodyA, htmlA);
                replaceContent(panelBodyB, htmlB);

                // diff 결과 렌더링 후 스크롤 초기화
                panelBodyA.scrollTop = 0;
                panelBodyB.scrollTop = 0;
            }

            function replaceContent(panel, html) {
                var old = panel.querySelector('.cp-text-content');
                if (old) old.remove();
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                panel.insertAdjacentHTML('beforeend', html);
            }

            function buildChangeOrder(changes, parasA, parasB) {
                // 변경점을 원래 단락 순서대로 정렬하여 양쪽 패널 동기화
                var order = [];
                var iA = 0, iB = 0;
                var changesByA = {};
                var changesByB = {};
                var addedAtB = {};
                var deletedAtA = {};

                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    if (c.type === 'modified') {
                        changesByA[c.indexA] = c;
                        changesByB[c.indexB] = c;
                    } else if (c.type === 'deleted') {
                        deletedAtA[c.indexA] = c;
                    } else if (c.type === 'added') {
                        addedAtB[c.indexB] = c;
                    }
                }

                while (iA < parasA.length || iB < parasB.length) {
                    // deleted at iA?
                    if (deletedAtA[iA]) {
                        order.push({ type: 'deleted', change: deletedAtA[iA] });
                        iA++;
                        continue;
                    }
                    // added at iB?
                    if (addedAtB[iB]) {
                        order.push({ type: 'added', change: addedAtB[iB] });
                        iB++;
                        continue;
                    }
                    // modified at iA/iB?
                    if (changesByA[iA]) {
                        order.push({ type: 'modified', change: changesByA[iA] });
                        iA++;
                        iB++;
                        continue;
                    }
                    // equal
                    if (iA < parasA.length && iB < parasB.length) {
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iA++;
                        iB++;
                    } else if (iA < parasA.length) {
                        // 남은 A는 deleted로 처리 (safety)
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iA++;
                    } else {
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iB++;
                    }
                }

                return order;
            }

            function renderWordDiffsA(wordDiffs) {
                // Panel A: removed 표시, added 숨김
                var html = '';
                for (var i = 0; i < wordDiffs.length; i++) {
                    var w = wordDiffs[i];
                    if (w.added) continue;
                    if (w.removed) {
                        html += '<span class="diff-word-deleted">' + escapeHTML(w.value) + '</span>';
                    } else {
                        html += escapeHTML(w.value);
                    }
                }
                return html;
            }

            function renderWordDiffsB(wordDiffs) {
                // Panel B: added 표시, removed 숨김
                var html = '';
                for (var i = 0; i < wordDiffs.length; i++) {
                    var w = wordDiffs[i];
                    if (w.removed) continue;
                    if (w.added) {
                        html += '<span class="diff-word-added">' + escapeHTML(w.value) + '</span>';
                    } else {
                        html += escapeHTML(w.value);
                    }
                }
                return html;
            }

            // ── 2-4. 변경 목록 사이드바 ──
            function renderSidebar(changes) {
                if (changes.length === 0) {
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty" id="cp-sidebar-empty">'
                        + (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0
                            ? '변경점이 없습니다'
                            : '비교 결과가 여기에 표시됩니다')
                        + '</div>';
                    return;
                }

                var added = 0, deleted = 0, modified = 0;
                for (var i = 0; i < changes.length; i++) {
                    if (changes[i].type === 'added') added++;
                    else if (changes[i].type === 'deleted') deleted++;
                    else if (changes[i].type === 'modified') modified++;
                }

                var badgeLabels = { added: '추가', deleted: '삭제', modified: '수정' };

                var html = '<div class="cp-diff-stats">';
                if (added > 0) html += '<span class="cp-stat cp-stat-added">+' + added + '</span>';
                if (deleted > 0) html += '<span class="cp-stat cp-stat-deleted">-' + deleted + '</span>';
                if (modified > 0) html += '<span class="cp-stat cp-stat-modified">~' + modified + '</span>';
                html += '</div>';

                html += '<div class="cp-change-list" id="cp-change-list">';
                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    var hidden = !diffState.filter[c.type] ? ' cp-change-hidden' : '';
                    var summaryText = c.summary || '';
                    if (summaryText.length > 80) summaryText = summaryText.substring(0, 80) + '…';

                    html += '<div class="cp-change-item cp-change-' + c.type + hidden + '" data-change-index="' + i + '">'
                        + '<span class="cp-change-badge">' + badgeLabels[c.type] + '</span>'
                        + '<span class="cp-change-text">' + escapeHTML(summaryText) + '</span>'
                        + '</div>';
                }
                html += '</div>';

                sidebarBody.innerHTML = html;
            }

            // 사이드바 클릭 이벤트 위임
            sidebarBody.addEventListener('click', function(e) {
                var item = e.target.closest('[data-change-index]');
                if (!item) return;
                var idx = parseInt(item.getAttribute('data-change-index'), 10);
                navigateToChange(idx);
            });

            // ── 2-3. 변경점 네비게이션 ──
            function getFilteredIndices() {
                var indices = [];
                for (var i = 0; i < diffState.changes.length; i++) {
                    if (diffState.filter[diffState.changes[i].type]) {
                        indices.push(i);
                    }
                }
                return indices;
            }

            function updateNavigation() {
                var filtered = getFilteredIndices();
                var total = filtered.length;

                if (total === 0) {
                    navIndicator.textContent = '0/0';
                    navPrev.disabled = true;
                    navNext.disabled = true;
                    return;
                }

                var pos = 0;
                if (diffState.currentIndex >= 0) {
                    pos = filtered.indexOf(diffState.currentIndex);
                    if (pos < 0) pos = 0;
                }

                navIndicator.textContent = (diffState.currentIndex >= 0 ? (pos + 1) : 0) + '/' + total;
                navPrev.disabled = pos <= 0 || diffState.currentIndex < 0;
                navNext.disabled = pos >= total - 1 && diffState.currentIndex >= 0;
            }

            function navigateToChange(index) {
                if (index < 0 || index >= diffState.changes.length) return;
                var c = diffState.changes[index];

                // 이전 활성 해제
                document.querySelectorAll('.diff-active').forEach(function(el) {
                    el.classList.remove('diff-active');
                });
                document.querySelectorAll('.cp-change-item.active').forEach(function(el) {
                    el.classList.remove('active');
                });

                diffState.currentIndex = index;

                // 패널 하이라이트 + 스크롤
                // added → Panel B 기준 (A에는 gap뿐), 나머지 → Panel A 기준
                var scrollTarget = (c.type === 'added') ? panelBodyB : panelBodyA;
                var otherPanel = (scrollTarget === panelBodyA) ? panelBodyB : panelBodyA;
                var targets = document.querySelectorAll('[data-change-index="' + index + '"]');
                var scrollEl = null;
                targets.forEach(function(el) {
                    if (el.classList.contains('cp-paragraph')) {
                        el.classList.add('diff-active');
                        if (!scrollEl && scrollTarget.contains(el)) {
                            scrollEl = el;
                        }
                    }
                    if (el.classList.contains('cp-change-item')) {
                        el.classList.add('active');
                        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });

                // 양쪽 패널 동시 instant 스크롤 (scrollTop 직접 설정)
                if (scrollEl) {
                    var elTop = scrollEl.offsetTop;
                    var panelH = scrollTarget.clientHeight;
                    var desiredTop = elTop - (panelH / 2) + (scrollEl.offsetHeight / 2);
                    desiredTop = Math.max(0, Math.min(desiredTop, scrollTarget.scrollHeight - panelH));

                    // scroll 이벤트에 의한 역방향 동기화 방지
                    scrollSyncing = true;
                    scrollTarget.scrollTop = desiredTop;

                    if (scrollSyncEnabled) {
                        var maxS = scrollTarget.scrollHeight - panelH;
                        var maxT = otherPanel.scrollHeight - otherPanel.clientHeight;
                        if (maxS > 0 && maxT > 0) {
                            otherPanel.scrollTop = (desiredTop / maxS) * maxT;
                        }
                    }
                    scrollSyncing = false;
                }

                updateNavigation();
            }

            function navigatePrev() {
                var filtered = getFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(diffState.currentIndex);
                if (pos > 0) {
                    navigateToChange(filtered[pos - 1]);
                } else if (diffState.currentIndex < 0) {
                    navigateToChange(filtered[0]);
                }
            }

            function navigateNext() {
                var filtered = getFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(diffState.currentIndex);
                if (pos < 0) {
                    navigateToChange(filtered[0]);
                } else if (pos < filtered.length - 1) {
                    navigateToChange(filtered[pos + 1]);
                }
            }

            navPrev.addEventListener('click', navigatePrev);
            navNext.addEventListener('click', navigateNext);

            // 키보드 네비게이션
            document.addEventListener('keydown', function(e) {
                if (diffState.changes.length === 0) return;
                // 편집 중이면 무시
                if (e.target.isContentEditable || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

                if (e.key === 'ArrowUp' || e.key === 'k') {
                    e.preventDefault();
                    navigatePrev();
                } else if (e.key === 'ArrowDown' || e.key === 'j') {
                    e.preventDefault();
                    navigateNext();
                }
            });

            // ── 2-5. 텍스트 편집 모드 ──
            function toggleEditMode() {
                editMode = !editMode;
                editToggleBtn.classList.toggle('active', editMode);

                if (editMode) {
                    // 편집 ON: diff 하이라이트 제거, contenteditable 설정
                    ['a', 'b'].forEach(function(side) {
                        if (docState[side].paragraphs.length === 0) return;
                        var panel = getPanel(side);
                        renderParagraphs(panel, docState[side].paragraphs);
                        var paras = panel.querySelectorAll('.cp-paragraph');
                        paras.forEach(function(p) {
                            p.setAttribute('contenteditable', 'true');
                            p.classList.add('cp-editable');
                        });
                    });
                    // 네비/필터 숨기기
                    navGroup.style.display = 'none';
                    filterGroup.style.display = 'none';
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty">편집 모드 — 변경 후 편집을 끄면 재비교합니다</div>';
                } else {
                    // 편집 OFF: 텍스트 추출 → docState 갱신 → 재비교
                    ['a', 'b'].forEach(function(side) {
                        if (docState[side].paragraphs.length === 0) return;
                        syncEditsToState(side);
                    });
                    navGroup.style.display = '';
                    filterGroup.style.display = '';
                    tryRunDiff();
                }
            }

            function syncEditsToState(side) {
                var panel = getPanel(side);
                var paras = panel.querySelectorAll('.cp-paragraph');
                var newParagraphs = [];
                paras.forEach(function(p) {
                    // textContent 그대로 유지 (빈 단락도 보존)
                    newParagraphs.push(p.textContent);
                });
                // 후행 빈 단락만 제거
                while (newParagraphs.length > 0 && !newParagraphs[newParagraphs.length - 1].trim()) {
                    newParagraphs.pop();
                }
                docState[side].paragraphs = newParagraphs;
                docState[side].text = newParagraphs.join('\n');
            }

            // ── 2-8. A ↔ B 교체 ──
            swapBtn.addEventListener('click', function() {
                if (editMode) return; // 편집 중에는 교체 불가

                // docState 교체
                var tmp = docState.a;
                docState.a = docState.b;
                docState.b = tmp;

                // 라벨 교체
                labelA.textContent = docState.a.filename || getDefaultLabel('a');
                labelA.title = docState.a.filename || '';
                labelB.textContent = docState.b.filename || getDefaultLabel('b');
                labelB.title = docState.b.filename || '';

                // 제거 버튼 상태
                fileRemoveA.classList.toggle('visible', !!docState.a.filename);
                fileRemoveB.classList.toggle('visible', !!docState.b.filename);

                // 재렌더 + 재비교
                if (docState.a.paragraphs.length > 0) {
                    renderParagraphs(panelBodyA, docState.a.paragraphs);
                } else {
                    restorePlaceholder('a');
                }
                if (docState.b.paragraphs.length > 0) {
                    renderParagraphs(panelBodyB, docState.b.paragraphs);
                } else {
                    restorePlaceholder('b');
                }

                tryRunDiff();
            });

            editToggleBtn.addEventListener('click', toggleEditMode);

            // ── 2-6. 필터링 ──
            filterBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isVisible = filterDropdown.style.display !== 'none';
                filterDropdown.style.display = isVisible ? 'none' : '';
                filterBtn.classList.toggle('active', !isVisible);
            });

            // 드롭다운 외부 클릭 시 닫기
            document.addEventListener('click', function(e) {
                if (!filterGroup.contains(e.target)) {
                    filterDropdown.style.display = 'none';
                    filterBtn.classList.remove('active');
                }
            });

            filterDropdown.addEventListener('change', function(e) {
                var input = e.target;
                if (!input.dataset.filter) return;

                var filterType = input.dataset.filter;

                if (filterType === 'ignoreWhitespace') {
                    diffState.ignoreWhitespace = input.checked;
                    // 재비교
                    if (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0) {
                        runDiff();
                    }
                } else {
                    diffState.filter[filterType] = input.checked;
                    applyFilter();
                }
            });

            function applyFilter() {
                // 패널 하이라이트 토글
                for (var i = 0; i < diffState.changes.length; i++) {
                    var c = diffState.changes[i];
                    var show = diffState.filter[c.type];
                    var els = document.querySelectorAll('.cp-paragraph[data-change-index="' + i + '"]');
                    els.forEach(function(el) {
                        el.classList.toggle('diff-hidden', !show);
                    });
                }

                // 사이드바 항목 토글
                var items = document.querySelectorAll('.cp-change-item');
                items.forEach(function(item) {
                    var idx = parseInt(item.getAttribute('data-change-index'), 10);
                    var c = diffState.changes[idx];
                    if (c) {
                        item.classList.toggle('cp-change-hidden', !diffState.filter[c.type]);
                    }
                });

                // 현재 인덱스가 필터 밖이면 리셋
                if (diffState.currentIndex >= 0 && !diffState.filter[diffState.changes[diffState.currentIndex].type]) {
                    diffState.currentIndex = -1;
                    document.querySelectorAll('.diff-active').forEach(function(el) {
                        el.classList.remove('diff-active');
                    });
                    document.querySelectorAll('.cp-change-item.active').forEach(function(el) {
                        el.classList.remove('active');
                    });
                }

                updateNavigation();
            }
        })();
    </script>
</body>
</html>
