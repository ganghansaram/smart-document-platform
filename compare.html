                updateGrid();
            }

            sidebarCollapse.addEventListener('click', collapseSidebar);
            sidebarRestore.addEventListener('click', expandSidebar);

            // ── 사이드바 리사이즈 핸들 (Explorer 패턴) ──
            (function() {
                var isResizing = false;

                resizeHandle.addEventListener('mousedown', function(e) {
                    if (!sidebarOpen) return;
                    isResizing = true;
                    resizeHandle.classList.add('dragging');
                    document.body.classList.add('cp-resizing');
                    e.preventDefault();
                });

                document.addEventListener('mousemove', function(e) {
                    if (!isResizing) return;
                    var rect = compareMain.getBoundingClientRect();
                    var newWidth = rect.right - e.clientX;
                    newWidth = Math.max(SIDEBAR_MIN, Math.min(SIDEBAR_MAX, newWidth));
                    sidebarWidth = newWidth;
                    updateGrid();
                });

                document.addEventListener('mouseup', function() {
                    if (isResizing) {
                        isResizing = false;
                        resizeHandle.classList.remove('dragging');
                        document.body.classList.remove('cp-resizing');
                    }
                });
            })();

            // ── 테마 토글 ──
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.body.setAttribute('data-theme', 'dark');
                } else {
                    document.body.removeAttribute('data-theme');
                }
            }

            function toggleTheme() {
                var isDark = document.body.getAttribute('data-theme') === 'dark';
                var next = isDark ? 'light' : 'dark';
                applyTheme(next);
                try { localStorage.setItem('theme', next); } catch(e) {}
            }

            // 저장된 테마 복원
            try {
                var saved = localStorage.getItem('theme');
                if (saved) applyTheme(saved);
            } catch(e) {}

            // ── 헤더 초기화 ──
            var headerResult = initPlatformHeader({
                title: 'Document Compare',
                currentSystem: 'compare',
                navItems: [],
                showThemeToggle: true,
                onAuth: function(user) {
                    document.body.style.visibility = 'visible';
                }
            });

            // 모드 토글을 툴바 끝에 삽입
            var toolbar = document.getElementById('compare-toolbar');
            toolbar.appendChild(modeToggle);

            // 테마 토글 이벤트
            if (headerResult.themeToggle) {
                headerResult.themeToggle.addEventListener('click', toggleTheme);
            }

            // ── 스크롤 동기화 ──
            scrollSyncBtn.addEventListener('click', function() {
                scrollSyncEnabled = !scrollSyncEnabled;
                scrollSyncBtn.classList.toggle('active', scrollSyncEnabled);
            });

            function syncScroll(source, target) {
                if (!scrollSyncEnabled || scrollSyncing) return;
                scrollSyncing = true;
                var maxS = source.scrollHeight - source.clientHeight;
                var maxT = target.scrollHeight - target.clientHeight;
                if (maxS > 0 && maxT > 0) {
                    var ratio = source.scrollTop / maxS;
                    target.scrollTop = ratio * maxT;
                }
                scrollSyncing = false;
            }

            panelBodyA.addEventListener('scroll', function() { syncScroll(panelBodyA, panelBodyB); });
            panelBodyB.addEventListener('scroll', function() { syncScroll(panelBodyB, panelBodyA); });

            // ══════════════════════════════════════════
            // Phase 2: Diff 엔진 + 시각화 + 사이드바 + 네비게이션 + 편집 + 필터
            // ══════════════════════════════════════════

            // ── 2-1. Diff 엔진 ──
            function normalizeText(text) {
                if (!diffState.ignoreWhitespace) return text;
                return text.replace(/\s+/g, ' ').trim();
            }

            // 유사도 계산 (0~1): 공통 단어 비율
            function similarity(a, b) {
                var wordsA = a.split(/\s+/);
                var wordsB = b.split(/\s+/);
                if (wordsA.length === 0 && wordsB.length === 0) return 1;
                if (wordsA.length === 0 || wordsB.length === 0) return 0;
                var setB = {};
                wordsB.forEach(function(w) { setB[w] = (setB[w] || 0) + 1; });
                var common = 0;
                wordsA.forEach(function(w) {
                    if (setB[w] > 0) { common++; setB[w]--; }
                });
                return (2 * common) / (wordsA.length + wordsB.length);
            }

            function computeDiff() {
                var parasA = docState.a.paragraphs;
                var parasB = docState.b.paragraphs;

                // Level 1: 단락 정렬 (diffArrays)
                var normA = parasA.map(normalizeText);
                var normB = parasB.map(normalizeText);
                var arrayDiff = Diff.diffArrays(normA, normB);

                // 중간 결과 수집 (removed/added 연속 구간을 페어링하기 위해)
                var rawChanges = [];
                var idxA = 0, idxB = 0;

                for (var i = 0; i < arrayDiff.length; i++) {
                    var part = arrayDiff[i];
                    if (part.added) {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'added', idxA: null, idxB: idxB++ });
                        }
                    } else if (part.removed) {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'deleted', idxA: idxA++, idxB: null });
                        }
                    } else {
                        for (var j = 0; j < part.count; j++) {
                            rawChanges.push({ type: 'equal', idxA: idxA++, idxB: idxB++ });
                        }
                    }
                }

                // Level 2: 인접 deleted+added 페어링 → modified 변환
                var SIMILARITY_THRESHOLD = 0.5;
                var changes = [];

                var k = 0;
                while (k < rawChanges.length) {
                    var rc = rawChanges[k];

                    if (rc.type === 'equal') {
                        // equal — 원문이 다를 수 있음 (공백 무시 시)
                        var tA = parasA[rc.idxA];
                        var tB = parasB[rc.idxB];
                        if (tA !== tB) {
                            var wordDiffs = Diff.diffWords(
                                diffState.ignoreWhitespace ? normalizeText(tA) : tA,
                                diffState.ignoreWhitespace ? normalizeText(tB) : tB
                            );
                            var hasChange = wordDiffs.some(function(w) { return w.added || w.removed; });
                            if (hasChange) {
                                changes.push({
                                    type: 'modified', indexA: rc.idxA, indexB: rc.idxB,
                                    textA: tA, textB: tB, wordDiffs: wordDiffs,
                                    summary: tA.substring(0, 60)
                                });
                            }
                        }
                        k++;
                        continue;
                    }

                    // 연속된 deleted + added 수집
                    var dels = [], adds = [];
                    while (k < rawChanges.length && (rawChanges[k].type === 'deleted' || rawChanges[k].type === 'added')) {
                        if (rawChanges[k].type === 'deleted') dels.push(rawChanges[k]);
                        else adds.push(rawChanges[k]);
                        k++;
                    }

                    // 페어링: 유사한 deleted-added 쌍을 modified로
                    var usedDel = {}, usedAdd = {};
                    var pairs = [];

                    for (var di = 0; di < dels.length; di++) {
                        var bestSim = 0, bestAi = -1;
                        for (var ai = 0; ai < adds.length; ai++) {
                            if (usedAdd[ai]) continue;
                            var sim = similarity(parasA[dels[di].idxA], parasB[adds[ai].idxB]);
                            if (sim > bestSim) { bestSim = sim; bestAi = ai; }
                        }
                        if (bestSim >= SIMILARITY_THRESHOLD && bestAi >= 0) {
                            pairs.push({ di: di, ai: bestAi, sim: bestSim });
                            usedDel[di] = true;
                            usedAdd[bestAi] = true;
                        }
                    }

                    // 출력 순서: 원래 인덱스 순
                    var allEntries = [];
                    for (var di = 0; di < dels.length; di++) {
                        if (usedDel[di]) {
                            var pair = pairs.filter(function(p) { return p.di === di; })[0];
                            var tA = parasA[dels[di].idxA];
                            var tB = parasB[adds[pair.ai].idxB];
                            var wordDiffs = Diff.diffWords(
                                diffState.ignoreWhitespace ? normalizeText(tA) : tA,
                                diffState.ignoreWhitespace ? normalizeText(tB) : tB
                            );
                            allEntries.push({
                                sortKey: dels[di].idxA,
                                change: {
                                    type: 'modified', indexA: dels[di].idxA, indexB: adds[pair.ai].idxB,
                                    textA: tA, textB: tB, wordDiffs: wordDiffs,
                                    summary: tA.substring(0, 60)
                                }
                            });
                        } else {
                            allEntries.push({
                                sortKey: dels[di].idxA,
                                change: {
                                    type: 'deleted', indexA: dels[di].idxA, indexB: null,
                                    textA: parasA[dels[di].idxA], textB: null,
                                    wordDiffs: null, summary: parasA[dels[di].idxA]
                                }
                            });
                        }
                    }
                    for (var ai = 0; ai < adds.length; ai++) {
                        if (!usedAdd[ai]) {
                            allEntries.push({
                                sortKey: adds[ai].idxB + 0.5,  // added는 deleted 뒤에
                                change: {
                                    type: 'added', indexA: null, indexB: adds[ai].idxB,
                                    textA: null, textB: parasB[adds[ai].idxB],
                                    wordDiffs: null, summary: parasB[adds[ai].idxB]
                                }
                            });
                        }
                    }

                    allEntries.sort(function(a, b) { return a.sortKey - b.sortKey; });
                    for (var ei = 0; ei < allEntries.length; ei++) {
                        changes.push(allEntries[ei].change);
                    }
                }

                return changes;
            }

            function tryRunDiff() {
                if (currentMode !== 'compare') return;
                if (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0) {
                    runDiff();
                }
            }

            function runDiff() {
                diffState.changes = computeDiff();
                diffState.currentIndex = -1;
                renderDiffHighlights(diffState.changes);
                renderSidebar(diffState.changes);
                showDiffUI(true);
                updateNavigation();
            }

            function clearDiff() {
                diffState.changes = [];
                diffState.currentIndex = -1;

                // 패널 원래 렌더링 복원 (양쪽 모두 파일이 있는 경우)
                ['a', 'b'].forEach(function(side) {
                    if (docState[side].paragraphs.length > 0) {
                        renderParagraphs(getPanel(side), docState[side].paragraphs);
                    }
                });

                renderSidebar([]);
                showDiffUI(false);
                updateNavigation();
            }

            function showDiffUI(show) {
                navGroup.style.display = show ? '' : 'none';
                swapBtn.style.display = show ? '' : 'none';
                editToggleBtn.style.display = show ? '' : 'none';
                filterGroup.style.display = show ? '' : 'none';
                if (!show && editMode) toggleEditMode();
            }

            // ── 2-2. Diff 시각화 ──
            function renderDiffHighlights(changes) {
                var parasA = docState.a.paragraphs;
                var parasB = docState.b.paragraphs;

                // 단락별 매핑 구축
                var mapA = {}; // indexA → change
                var mapB = {}; // indexB → change
                var gapsA = []; // panel A에 삽입할 gap (added 항목)
                var gapsB = []; // panel B에 삽입할 gap (deleted 항목)

                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    c._changeIndex = i;
                    if (c.type === 'added') {
                        mapB[c.indexB] = c;
                    } else if (c.type === 'deleted') {
                        mapA[c.indexA] = c;
                    } else if (c.type === 'modified') {
                        mapA[c.indexA] = c;
                        mapB[c.indexB] = c;
                    }
                }

                // 양쪽 패널 동시 재구성
                // 전략: 두 문서의 인덱스를 동기 진행하면서 HTML 빌드
                var htmlA = '<div class="cp-text-content">';
                var htmlB = '<div class="cp-text-content">';

                var iA = 0, iB = 0;
                var changeOrder = buildChangeOrder(changes, parasA, parasB);

                for (var k = 0; k < changeOrder.length; k++) {
                    var entry = changeOrder[k];

                    if (entry.type === 'equal') {
                        htmlA += '<div class="cp-paragraph" data-index="' + entry.iA + '">' + escapeHTML(parasA[entry.iA]) + '</div>';
                        htmlB += '<div class="cp-paragraph" data-index="' + entry.iB + '">' + escapeHTML(parasB[entry.iB]) + '</div>';
                    } else if (entry.type === 'added') {
                        var c = entry.change;
                        var hidden = !diffState.filter.added ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-gap' + hidden + '" data-change-index="' + c._changeIndex + '"></div>';
                        htmlB += '<div class="cp-paragraph diff-para-added' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexB + '">' + escapeHTML(parasB[c.indexB]) + '</div>';
                    } else if (entry.type === 'deleted') {
                        var c = entry.change;
                        var hidden = !diffState.filter.deleted ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-para-deleted' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexA + '">' + escapeHTML(parasA[c.indexA]) + '</div>';
                        htmlB += '<div class="cp-paragraph diff-gap' + hidden + '" data-change-index="' + c._changeIndex + '"></div>';
                    } else if (entry.type === 'modified') {
                        var c = entry.change;
                        var hidden = !diffState.filter.modified ? ' diff-hidden' : '';
                        htmlA += '<div class="cp-paragraph diff-para-modified' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexA + '">' + renderWordDiffsA(c.wordDiffs) + '</div>';
                        htmlB += '<div class="cp-paragraph diff-para-modified' + hidden + '" data-change-index="' + c._changeIndex + '" data-index="' + c.indexB + '">' + renderWordDiffsB(c.wordDiffs) + '</div>';
                    }
                }

                htmlA += '</div>';
                htmlB += '</div>';

                // 기존 콘텐츠 교체
                replaceContent(panelBodyA, htmlA);
                replaceContent(panelBodyB, htmlB);

                // diff 결과 렌더링 후 스크롤 초기화
                panelBodyA.scrollTop = 0;
                panelBodyB.scrollTop = 0;
            }

            function replaceContent(panel, html) {
                var old = panel.querySelector('.cp-text-content');
                if (old) old.remove();
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                panel.insertAdjacentHTML('beforeend', html);
            }

            function buildChangeOrder(changes, parasA, parasB) {
                // 변경점을 원래 단락 순서대로 정렬하여 양쪽 패널 동기화
                var order = [];
                var iA = 0, iB = 0;
                var changesByA = {};
                var changesByB = {};
                var addedAtB = {};
                var deletedAtA = {};

                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    if (c.type === 'modified') {
                        changesByA[c.indexA] = c;
                        changesByB[c.indexB] = c;
                    } else if (c.type === 'deleted') {
                        deletedAtA[c.indexA] = c;
                    } else if (c.type === 'added') {
                        addedAtB[c.indexB] = c;
                    }
                }

                while (iA < parasA.length || iB < parasB.length) {
                    // deleted at iA?
                    if (deletedAtA[iA]) {
                        order.push({ type: 'deleted', change: deletedAtA[iA] });
                        iA++;
                        continue;
                    }
                    // added at iB?
                    if (addedAtB[iB]) {
                        order.push({ type: 'added', change: addedAtB[iB] });
                        iB++;
                        continue;
                    }
                    // modified at iA/iB?
                    if (changesByA[iA]) {
                        order.push({ type: 'modified', change: changesByA[iA] });
                        iA++;
                        iB++;
                        continue;
                    }
                    // equal
                    if (iA < parasA.length && iB < parasB.length) {
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iA++;
                        iB++;
                    } else if (iA < parasA.length) {
                        // 남은 A는 deleted로 처리 (safety)
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iA++;
                    } else {
                        order.push({ type: 'equal', iA: iA, iB: iB });
                        iB++;
                    }
                }

                return order;
            }

            function renderWordDiffsA(wordDiffs) {
                // Panel A: removed 표시, added 숨김
                var html = '';
                for (var i = 0; i < wordDiffs.length; i++) {
                    var w = wordDiffs[i];
                    if (w.added) continue;
                    if (w.removed) {
                        html += '<span class="diff-word-deleted">' + escapeHTML(w.value) + '</span>';
                    } else {
                        html += escapeHTML(w.value);
                    }
                }
                return html;
            }

            function renderWordDiffsB(wordDiffs) {
                // Panel B: added 표시, removed 숨김
                var html = '';
                for (var i = 0; i < wordDiffs.length; i++) {
                    var w = wordDiffs[i];
                    if (w.removed) continue;
                    if (w.added) {
                        html += '<span class="diff-word-added">' + escapeHTML(w.value) + '</span>';
                    } else {
                        html += escapeHTML(w.value);
                    }
                }
                return html;
            }

            // ── 2-4. 변경 목록 사이드바 ──
            function renderSidebar(changes) {
                if (changes.length === 0) {
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty" id="cp-sidebar-empty">'
                        + (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0
                            ? '변경점이 없습니다'
                            : '비교 결과가 여기에 표시됩니다')
                        + '</div>';
                    return;
                }

                var added = 0, deleted = 0, modified = 0;
                for (var i = 0; i < changes.length; i++) {
                    if (changes[i].type === 'added') added++;
                    else if (changes[i].type === 'deleted') deleted++;
                    else if (changes[i].type === 'modified') modified++;
                }

                var badgeLabels = { added: '추가', deleted: '삭제', modified: '수정' };

                var html = '<div class="cp-diff-stats">';
                if (added > 0) html += '<span class="cp-stat cp-stat-added">+' + added + '</span>';
                if (deleted > 0) html += '<span class="cp-stat cp-stat-deleted">-' + deleted + '</span>';
                if (modified > 0) html += '<span class="cp-stat cp-stat-modified">~' + modified + '</span>';
                html += '</div>';

                html += '<div class="cp-change-list" id="cp-change-list">';
                for (var i = 0; i < changes.length; i++) {
                    var c = changes[i];
                    var hidden = !diffState.filter[c.type] ? ' cp-change-hidden' : '';
                    var summaryText = c.summary || '';
                    if (summaryText.length > 80) summaryText = summaryText.substring(0, 80) + '…';

                    html += '<div class="cp-change-item cp-change-' + c.type + hidden + '" data-change-index="' + i + '">'
                        + '<span class="cp-change-badge">' + badgeLabels[c.type] + '</span>'
                        + '<span class="cp-change-text">' + escapeHTML(summaryText) + '</span>'
                        + '</div>';
                }
                html += '</div>';

                sidebarBody.innerHTML = html;
            }

            // 사이드바 클릭 이벤트 위임
            sidebarBody.addEventListener('click', function(e) {
                var item = e.target.closest('[data-change-index]');
                if (!item) return;
                var idx = parseInt(item.getAttribute('data-change-index'), 10);
                navigateToChange(idx);
            });

            // ── 2-3. 변경점 네비게이션 ──
            function getFilteredIndices() {
                var indices = [];
                for (var i = 0; i < diffState.changes.length; i++) {
                    if (diffState.filter[diffState.changes[i].type]) {
                        indices.push(i);
                    }
                }
                return indices;
            }

            function updateNavigation() {
                var filtered = getFilteredIndices();
                var total = filtered.length;

                if (total === 0) {
                    navIndicator.textContent = '0/0';
                    navPrev.disabled = true;
                    navNext.disabled = true;
                    return;
                }

                var pos = 0;
                if (diffState.currentIndex >= 0) {
                    pos = filtered.indexOf(diffState.currentIndex);
                    if (pos < 0) pos = 0;
                }

                navIndicator.textContent = (diffState.currentIndex >= 0 ? (pos + 1) : 0) + '/' + total;
                navPrev.disabled = pos <= 0 || diffState.currentIndex < 0;
                navNext.disabled = pos >= total - 1 && diffState.currentIndex >= 0;
            }

            function navigateToChange(index) {
                if (index < 0 || index >= diffState.changes.length) return;
                var c = diffState.changes[index];

                // 이전 활성 해제
                document.querySelectorAll('.diff-active').forEach(function(el) {
                    el.classList.remove('diff-active');
                });
                document.querySelectorAll('.cp-change-item.active').forEach(function(el) {
                    el.classList.remove('active');
                });

                diffState.currentIndex = index;

                // 패널 하이라이트 + 스크롤
                // added → Panel B 기준 (A에는 gap뿐), 나머지 → Panel A 기준
                var scrollTarget = (c.type === 'added') ? panelBodyB : panelBodyA;
                var otherPanel = (scrollTarget === panelBodyA) ? panelBodyB : panelBodyA;
                var targets = document.querySelectorAll('[data-change-index="' + index + '"]');
                var scrollEl = null;
                targets.forEach(function(el) {
                    if (el.classList.contains('cp-paragraph')) {
                        el.classList.add('diff-active');
                        if (!scrollEl && scrollTarget.contains(el)) {
                            scrollEl = el;
                        }
                    }
                    if (el.classList.contains('cp-change-item')) {
                        el.classList.add('active');
                        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                });

                // 양쪽 패널 동시 instant 스크롤 (scrollTop 직접 설정)
                if (scrollEl) {
                    var elTop = scrollEl.offsetTop;
                    var panelH = scrollTarget.clientHeight;
                    var desiredTop = elTop - (panelH / 2) + (scrollEl.offsetHeight / 2);
                    desiredTop = Math.max(0, Math.min(desiredTop, scrollTarget.scrollHeight - panelH));

                    // scroll 이벤트에 의한 역방향 동기화 방지
                    scrollSyncing = true;
                    scrollTarget.scrollTop = desiredTop;

                    if (scrollSyncEnabled) {
                        var maxS = scrollTarget.scrollHeight - panelH;
                        var maxT = otherPanel.scrollHeight - otherPanel.clientHeight;
                        if (maxS > 0 && maxT > 0) {
                            otherPanel.scrollTop = (desiredTop / maxS) * maxT;
                        }
                    }
                    scrollSyncing = false;
                }

                updateNavigation();
            }

            function navigatePrev() {
                var filtered = getFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(diffState.currentIndex);
                if (pos > 0) {
                    navigateToChange(filtered[pos - 1]);
                } else if (diffState.currentIndex < 0) {
                    navigateToChange(filtered[0]);
                }
            }

            function navigateNext() {
                var filtered = getFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(diffState.currentIndex);
                if (pos < 0) {
                    navigateToChange(filtered[0]);
                } else if (pos < filtered.length - 1) {
                    navigateToChange(filtered[pos + 1]);
                }
            }

            navPrev.addEventListener('click', navigatePrev);
            navNext.addEventListener('click', navigateNext);

            // 키보드 네비게이션 (모드에 따라 diff/validation 분기)
            document.addEventListener('keydown', function(e) {
                if (e.target.isContentEditable || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;

                if (e.key === 'ArrowUp' || e.key === 'k') {
                    if (currentMode === 'verify' && validateState.issues.length > 0) {
                        e.preventDefault();
                        vdNavigatePrev();
                    } else if (currentMode === 'compare' && diffState.changes.length > 0) {
                        e.preventDefault();
                        navigatePrev();
                    }
                } else if (e.key === 'ArrowDown' || e.key === 'j') {
                    if (currentMode === 'verify' && validateState.issues.length > 0) {
                        e.preventDefault();
                        vdNavigateNext();
                    } else if (currentMode === 'compare' && diffState.changes.length > 0) {
                        e.preventDefault();
                        navigateNext();
                    }
                }
            });

            // ── 2-5. 텍스트 편집 모드 ──
            function toggleEditMode() {
                editMode = !editMode;
                editToggleBtn.classList.toggle('active', editMode);

                if (editMode) {
                    // 편집 ON: diff 하이라이트 제거, contenteditable 설정
                    ['a', 'b'].forEach(function(side) {
                        if (docState[side].paragraphs.length === 0) return;
                        var panel = getPanel(side);
                        renderParagraphs(panel, docState[side].paragraphs);
                        var paras = panel.querySelectorAll('.cp-paragraph');
                        paras.forEach(function(p) {
                            p.setAttribute('contenteditable', 'true');
                            p.classList.add('cp-editable');
                        });
                    });
                    // 네비/필터 숨기기
                    navGroup.style.display = 'none';
                    filterGroup.style.display = 'none';
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty">편집 모드 — 변경 후 편집을 끄면 재비교합니다</div>';
                } else {
                    // 편집 OFF: 텍스트 추출 → docState 갱신 → 재비교
                    ['a', 'b'].forEach(function(side) {
                        if (docState[side].paragraphs.length === 0) return;
                        syncEditsToState(side);
                    });
                    navGroup.style.display = '';
                    filterGroup.style.display = '';
                    tryRunDiff();
                }
            }

            function syncEditsToState(side) {
                var panel = getPanel(side);
                var paras = panel.querySelectorAll('.cp-paragraph');
                var newParagraphs = [];
                paras.forEach(function(p) {
                    // textContent 그대로 유지 (빈 단락도 보존)
                    newParagraphs.push(p.textContent);
                });
                // 후행 빈 단락만 제거
                while (newParagraphs.length > 0 && !newParagraphs[newParagraphs.length - 1].trim()) {
                    newParagraphs.pop();
                }
                docState[side].paragraphs = newParagraphs;
                docState[side].text = newParagraphs.join('\n');
            }

            // ── 2-8. A ↔ B 교체 ──
            swapBtn.addEventListener('click', function() {
                if (editMode) return; // 편집 중에는 교체 불가

                // docState 교체
                var tmp = docState.a;
                docState.a = docState.b;
                docState.b = tmp;

                // 라벨 교체
                labelA.textContent = docState.a.filename || getDefaultLabel('a');
                labelA.title = docState.a.filename || '';
                labelB.textContent = docState.b.filename || getDefaultLabel('b');
                labelB.title = docState.b.filename || '';

                // 제거 버튼 상태
                fileRemoveA.classList.toggle('visible', !!docState.a.filename);
                fileRemoveB.classList.toggle('visible', !!docState.b.filename);

                // 재렌더 + 재비교
                if (docState.a.paragraphs.length > 0) {
                    renderParagraphs(panelBodyA, docState.a.paragraphs);
                } else {
                    restorePlaceholder('a');
                }
                if (docState.b.paragraphs.length > 0) {
                    renderParagraphs(panelBodyB, docState.b.paragraphs);
                } else {
                    restorePlaceholder('b');
                }

                tryRunDiff();
            });

            editToggleBtn.addEventListener('click', toggleEditMode);

            // ── 2-6. 필터링 ──
            filterBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isVisible = filterDropdown.style.display !== 'none';
                filterDropdown.style.display = isVisible ? 'none' : '';
                filterBtn.classList.toggle('active', !isVisible);
            });

            // 드롭다운 외부 클릭 시 닫기
            document.addEventListener('click', function(e) {
                if (!filterGroup.contains(e.target)) {
                    filterDropdown.style.display = 'none';
                    filterBtn.classList.remove('active');
                }
            });

            filterDropdown.addEventListener('change', function(e) {
                var input = e.target;
                if (!input.dataset.filter) return;

                var filterType = input.dataset.filter;

                if (filterType === 'ignoreWhitespace') {
                    diffState.ignoreWhitespace = input.checked;
                    // 재비교
                    if (docState.a.paragraphs.length > 0 && docState.b.paragraphs.length > 0) {
                        runDiff();
                    }
                } else {
                    diffState.filter[filterType] = input.checked;
                    applyFilter();
                }
            });

            function applyFilter() {
                // 패널 하이라이트 토글
                for (var i = 0; i < diffState.changes.length; i++) {
                    var c = diffState.changes[i];
                    var show = diffState.filter[c.type];
                    var els = document.querySelectorAll('.cp-paragraph[data-change-index="' + i + '"]');
                    els.forEach(function(el) {
                        el.classList.toggle('diff-hidden', !show);
                    });
                }

                // 사이드바 항목 토글
                var items = document.querySelectorAll('.cp-change-item');
                items.forEach(function(item) {
                    var idx = parseInt(item.getAttribute('data-change-index'), 10);
                    var c = diffState.changes[idx];
                    if (c) {
                        item.classList.toggle('cp-change-hidden', !diffState.filter[c.type]);
                    }
                });

                // 현재 인덱스가 필터 밖이면 리셋
                if (diffState.currentIndex >= 0 && !diffState.filter[diffState.changes[diffState.currentIndex].type]) {
                    diffState.currentIndex = -1;
                    document.querySelectorAll('.diff-active').forEach(function(el) {
                        el.classList.remove('diff-active');
                    });
                    document.querySelectorAll('.cp-change-item.active').forEach(function(el) {
                        el.classList.remove('active');
                    });
                }

                updateNavigation();
            }

            // ══════════════════════════════════════════
            // Phase 3: 검증 모드 (Validation Mode)
            // ══════════════════════════════════════════

            // ── 검증 상태 ──
            var validateState = {
                score: -1,
                summary: { error: 0, warning: 0, suggestion: 0 },
                issues: [],
                currentIndex: -1,
                filter: { error: true, warning: true, suggestion: true },
                isLoading: false
            };

            // ── 검증 DOM 참조 ──
            var vdNavGroup = document.getElementById('vd-nav-group');
            var vdNavPrev = document.getElementById('vd-nav-prev');
            var vdNavNext = document.getElementById('vd-nav-next');
            var vdNavIndicator = document.getElementById('vd-nav-indicator');
            var vdFilterGroup = document.getElementById('vd-filter-group');
            var vdFilterBtn = document.getElementById('vd-filter-btn');
            var vdFilterDropdown = document.getElementById('vd-filter-dropdown');
            var vdSettingsBtn = document.getElementById('vd-settings-btn');
            var vdRevalidateBtn = document.getElementById('vd-revalidate-btn');

            // ── 3-1. 검증 실행 ──
            function tryRunValidation() {
                if (currentMode !== 'verify') return;
                if (docState.a.paragraphs.length > 0) {
                    runValidation();
                }
            }

            function runValidation() {
                validateState.isLoading = true;
                validateState.currentIndex = -1;

                // 사이드바에 로딩 표시
                sidebarBody.innerHTML = '<div class="vd-loading">'
                    + '<div class="spinner cp-upload-spinner"></div>'
                    + '<span>검증 중...</span></div>';

                fetch(API_BASE + '/compare/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        paragraphs: docState.a.paragraphs,
                        preset: null
                    })
                })
                .then(function(res) {
                    if (!res.ok) {
                        return res.json().then(function(err) {
                            throw new Error(err.detail || '검증 실패');
                        });
                    }
                    return res.json();
                })
                .then(function(data) {
                    validateState.score = data.score;
                    validateState.summary = data.summary;
                    validateState.issues = data.issues;
                    validateState.isLoading = false;

                    renderValidationHighlights(data.issues);
                    renderValidationSidebar();
                    showValidationUI(true);
                    updateValidationNavigation();
                })
                .catch(function(err) {
                    validateState.isLoading = false;
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty" style="color:var(--color-error)">'
                        + '검증 오류: ' + escapeHTML(err.message) + '</div>';
                });
            }

            function clearValidation() {
                validateState.score = -1;
                validateState.summary = { error: 0, warning: 0, suggestion: 0 };
                validateState.issues = [];
                validateState.currentIndex = -1;
                validateState.isLoading = false;

                // 인라인 하이라이트 제거: 원래 텍스트로 복원
                if (docState.a.paragraphs.length > 0) {
                    renderParagraphs(panelBodyA, docState.a.paragraphs);
                }

                showValidationUI(false);

                // 사이드바 빈 상태
                if (currentMode === 'verify') {
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty" id="cp-sidebar-empty">검증 결과가 여기에 표시됩니다</div>';
                }
            }

            function showValidationUI(show) {
                vdNavGroup.style.display = show ? '' : 'none';
                vdFilterGroup.style.display = show ? '' : 'none';
            }

            // ── 3-2. 인라인 하이라이트 렌더링 ──
            function renderValidationHighlights(issues) {
                if (!issues || issues.length === 0) return;

                // 단락별 이슈 그룹화
                var byParagraph = {};
                for (var i = 0; i < issues.length; i++) {
                    var iss = issues[i];
                    var pi = iss.paragraph_index;
                    if (!byParagraph[pi]) byParagraph[pi] = [];
                    byParagraph[pi].push({ issue: iss, globalIndex: i });
                }

                // Panel A의 각 단락에 마크 삽입
                var content = panelBodyA.querySelector('.cp-text-content');
                if (!content) return;

                var paragraphEls = content.querySelectorAll('.cp-paragraph');

                for (var pi in byParagraph) {
                    var pIdx = parseInt(pi, 10);
                    if (pIdx >= paragraphEls.length) continue;

                    var el = paragraphEls[pIdx];
                    var text = docState.a.paragraphs[pIdx];
                    if (!text) continue;

                    // 이슈를 char_start 오름차순 정렬
                    var pIssues = byParagraph[pi].slice().sort(function(a, b) {
                        return a.issue.char_start - b.issue.char_start;
                    });

                    // 비중첩 span 삽입
                    var html = '';
                    var lastEnd = 0;

                    for (var j = 0; j < pIssues.length; j++) {
                        var iss = pIssues[j].issue;
                        var gIdx = pIssues[j].globalIndex;
                        var start = Math.max(iss.char_start, lastEnd);
                        var end = iss.char_end;

                        if (start >= end) continue;

                        // 마크 이전 텍스트
                        if (start > lastEnd) {
                            html += escapeHTML(text.substring(lastEnd, start));
                        }

                        var hidden = !validateState.filter[iss.severity] ? ' vd-mark-hidden' : '';
                        html += '<span class="validate-mark severity-' + iss.severity + hidden
                            + '" data-issue-index="' + gIdx + '"'
                            + ' title="' + escapeHTML(iss.message) + '">'
                            + escapeHTML(text.substring(start, end))
                            + '</span>';
                        lastEnd = end;
                    }

                    // 나머지 텍스트
                    if (lastEnd < text.length) {
                        html += escapeHTML(text.substring(lastEnd));
                    }

                    el.innerHTML = html;
                }

            }

            // ── 3-2. 검증 사이드바 렌더링 ──
            function renderValidationSidebar() {
                var issues = validateState.issues;
                var score = validateState.score;
                var summary = validateState.summary;

                if (issues.length === 0) {
                    sidebarBody.innerHTML = '<div class="cp-sidebar-empty">'
                        + (docState.a.paragraphs.length > 0 ? '이슈가 없습니다' : '검증 결과가 여기에 표시됩니다')
                        + '</div>';
                    return;
                }

                // 스코어 색상 — CSS 변수에서 런타임 읽기 (다크 모드 대응)
                var cs = getComputedStyle(document.documentElement);
                var colorGood = cs.getPropertyValue('--color-success').trim() || '#22c55e';
                var colorWarn = cs.getPropertyValue('--color-warning').trim() || '#f59e0b';
                var colorBad = cs.getPropertyValue('--color-error').trim() || '#ef4444';
                var scoreColor = score >= 90 ? colorGood : (score >= 70 ? colorWarn : colorBad);
                var scoreBg = score >= 90 ? 'rgba(34,197,94,0.1)' : (score >= 70 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)');

                // SVG 도넛 링
                var circumference = 2 * Math.PI * 14;
                var offset = circumference - (score / 100) * circumference;

                var html = '<div class="vd-score-card" style="background:' + scoreBg + '">'
                    + '<svg class="vd-score-ring" width="40" height="40" viewBox="0 0 36 36">'
                    + '<circle cx="18" cy="18" r="14" fill="none" stroke="' + scoreColor + '" stroke-opacity="0.2" stroke-width="3"/>'
                    + '<circle cx="18" cy="18" r="14" fill="none" stroke="' + scoreColor + '" stroke-width="3" stroke-linecap="round"'
                    + ' stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"'
                    + ' transform="rotate(-90 18 18)"/>'
                    + '<text x="18" y="18" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" fill="' + scoreColor + '">' + score + '</text>'
                    + '</svg>'
                    + '<div class="vd-score-details">';

                if (summary.error > 0) html += '<span class="vd-score-stat stat-error">오류 ' + summary.error + '</span>';
                if (summary.warning > 0) html += '<span class="vd-score-stat stat-warning">경고 ' + summary.warning + '</span>';
                if (summary.suggestion > 0) html += '<span class="vd-score-stat stat-suggestion">제안 ' + summary.suggestion + '</span>';

                html += '</div></div>';

                // 카테고리별 그룹화
                var categories = {};
                var categoryLabels = { structure: '구조', terminology: '용어', readability: '가독성' };
                var categoryOrder = ['structure', 'terminology', 'readability'];

                for (var i = 0; i < issues.length; i++) {
                    var cat = issues[i].category || 'etc';
                    if (!categories[cat]) categories[cat] = [];
                    categories[cat].push({ issue: issues[i], globalIndex: i });
                }

                var totalIssues = issues.length;
                var firstCategory = true;

                for (var ci = 0; ci < categoryOrder.length; ci++) {
                    var cat = categoryOrder[ci];
                    if (!categories[cat]) continue;
                    var catIssues = categories[cat];
                    var collapsed = totalIssues >= 15 && !firstCategory;

                    html += '<div class="vd-category' + (collapsed ? ' collapsed' : '') + '" data-vd-category="' + cat + '">'
                        + '<div class="vd-category-header">'
                        + '<span class="vd-category-arrow">&#9660;</span> '
                        + (categoryLabels[cat] || cat)
                        + ' <span class="vd-category-count">(' + catIssues.length + ')</span>'
                        + '</div>'
                        + '<div class="vd-category-body">';

                    for (var j = 0; j < catIssues.length; j++) {
                        var iss = catIssues[j].issue;
                        var gIdx = catIssues[j].globalIndex;
                        var sevLabel = iss.severity === 'error' ? '오류' : (iss.severity === 'warning' ? '경고' : '제안');
                        var hidden = !validateState.filter[iss.severity] ? ' vd-issue-hidden' : '';

                        html += '<div class="vd-issue-item severity-' + iss.severity + hidden + '" data-vd-issue-index="' + gIdx + '">'
                            + '<span class="vd-issue-badge">' + sevLabel + '</span>'
                            + '<span class="vd-issue-text">' + escapeHTML(iss.message) + '</span>'
                            + '</div>';
                    }

                    html += '</div></div>';
                    firstCategory = false;
                }

                sidebarBody.innerHTML = html;

                // 카테고리 접기/펼치기 이벤트
                sidebarBody.querySelectorAll('.vd-category-header').forEach(function(header) {
                    header.addEventListener('click', function() {
                        header.parentElement.classList.toggle('collapsed');
                    });
                });
            }

            // 사이드바 이슈 클릭 이벤트 위임
            sidebarBody.addEventListener('click', function(e) {
                var item = e.target.closest('[data-vd-issue-index]');
                if (!item) return;
                var idx = parseInt(item.getAttribute('data-vd-issue-index'), 10);
                if (!isNaN(idx)) {
                    vdNavigateToIssue(idx);
                }
            });

            // ── 3-4. 이슈 네비게이션 ──
            function getVdFilteredIndices() {
                var indices = [];
                for (var i = 0; i < validateState.issues.length; i++) {
                    if (validateState.filter[validateState.issues[i].severity]) {
                        indices.push(i);
                    }
                }
                return indices;
            }

            function updateValidationNavigation() {
                var filtered = getVdFilteredIndices();
                var total = filtered.length;

                if (total === 0) {
                    vdNavIndicator.textContent = '0/0';
                    vdNavPrev.disabled = true;
                    vdNavNext.disabled = true;
                    return;
                }

                var pos = 0;
                if (validateState.currentIndex >= 0) {
                    pos = filtered.indexOf(validateState.currentIndex);
                    if (pos < 0) pos = 0;
                }

                vdNavIndicator.textContent = (validateState.currentIndex >= 0 ? (pos + 1) : 0) + '/' + total;
                vdNavPrev.disabled = pos <= 0 || validateState.currentIndex < 0;
                vdNavNext.disabled = pos >= total - 1 && validateState.currentIndex >= 0;
            }

            function vdNavigateToIssue(index) {
                if (index < 0 || index >= validateState.issues.length) return;

                // 이전 활성 해제
                document.querySelectorAll('.validate-active').forEach(function(el) {
                    el.classList.remove('validate-active');
                });
                document.querySelectorAll('.vd-issue-item.active').forEach(function(el) {
                    el.classList.remove('active');
                });

                validateState.currentIndex = index;

                // 인라인 mark 활성화 + 스크롤
                var mark = panelBodyA.querySelector('.validate-mark[data-issue-index="' + index + '"]');
                if (mark) {
                    mark.classList.add('validate-active');
                    // instant 스크롤
                    var elTop = mark.offsetTop;
                    var panelH = panelBodyA.clientHeight;
                    var desiredTop = elTop - (panelH / 2) + (mark.offsetHeight / 2);
                    desiredTop = Math.max(0, Math.min(desiredTop, panelBodyA.scrollHeight - panelH));
                    panelBodyA.scrollTop = desiredTop;
                }

                // 사이드바 항목 활성화 + 스크롤
                var sidebarItem = sidebarBody.querySelector('.vd-issue-item[data-vd-issue-index="' + index + '"]');
                if (sidebarItem) {
                    sidebarItem.classList.add('active');
                    sidebarItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    // 카테고리가 접혀 있으면 펼치기
                    var category = sidebarItem.closest('.vd-category');
                    if (category && category.classList.contains('collapsed')) {
                        category.classList.remove('collapsed');
                    }
                }

                updateValidationNavigation();
            }

            function vdNavigatePrev() {
                var filtered = getVdFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(validateState.currentIndex);
                if (pos > 0) {
                    vdNavigateToIssue(filtered[pos - 1]);
                } else if (validateState.currentIndex < 0) {
                    vdNavigateToIssue(filtered[0]);
                }
            }

            function vdNavigateNext() {
                var filtered = getVdFilteredIndices();
                if (filtered.length === 0) return;
                var pos = filtered.indexOf(validateState.currentIndex);
                if (pos < 0) {
                    vdNavigateToIssue(filtered[0]);
                } else if (pos < filtered.length - 1) {
                    vdNavigateToIssue(filtered[pos + 1]);
                }
            }

            vdNavPrev.addEventListener('click', vdNavigatePrev);
            vdNavNext.addEventListener('click', vdNavigateNext);

            // 인라인 mark 클릭: panelBodyA 레벨 이벤트 위임 (리스너 누적 방지)
            panelBodyA.addEventListener('click', function(e) {
                var mark = e.target.closest('.validate-mark');
                if (!mark) return;
                var idx = parseInt(mark.getAttribute('data-issue-index'), 10);
                if (!isNaN(idx)) {
                    vdNavigateToIssue(idx);
                }
            });

            // ── 검증 필터 ──
            vdFilterBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                var isVisible = vdFilterDropdown.style.display !== 'none';
                vdFilterDropdown.style.display = isVisible ? 'none' : '';
                vdFilterBtn.classList.toggle('active', !isVisible);
            });

            document.addEventListener('click', function(e) {
                if (!vdFilterGroup.contains(e.target)) {
                    vdFilterDropdown.style.display = 'none';
                    vdFilterBtn.classList.remove('active');
                }
            });

            vdFilterDropdown.addEventListener('change', function(e) {
                var input = e.target;
                var filterType = input.getAttribute('data-vd-filter');
                if (!filterType) return;
                validateState.filter[filterType] = input.checked;
                applyValidationFilter();
            });

            function applyValidationFilter() {
                // 인라인 마크 토글 (CSS 클래스로 제어)
                var marks = panelBodyA.querySelectorAll('.validate-mark');
                marks.forEach(function(mark) {
                    var idx = parseInt(mark.getAttribute('data-issue-index'), 10);
                    var iss = validateState.issues[idx];
                    if (iss) {
                        mark.classList.toggle('vd-mark-hidden', !validateState.filter[iss.severity]);
                    }
                });

                // 사이드바 항목 토글
                var items = sidebarBody.querySelectorAll('.vd-issue-item');
                items.forEach(function(item) {
                    var idx = parseInt(item.getAttribute('data-vd-issue-index'), 10);
                    var iss = validateState.issues[idx];
                    if (iss) {
                        item.classList.toggle('vd-issue-hidden', !validateState.filter[iss.severity]);
                    }
                });

                // 현재 인덱스가 필터 밖이면 리셋
                if (validateState.currentIndex >= 0 && !validateState.filter[validateState.issues[validateState.currentIndex].severity]) {
                    validateState.currentIndex = -1;
                    document.querySelectorAll('.validate-active').forEach(function(el) {
                        el.classList.remove('validate-active');
                    });
                    document.querySelectorAll('.vd-issue-item.active').forEach(function(el) {
                        el.classList.remove('active');
                    });
                }

                updateValidationNavigation();
            }

            // ── 재검증 버튼 ──
            vdRevalidateBtn.addEventListener('click', function() {
                if (docState.a.paragraphs.length > 0) {
                    runValidation();
                }
            });

            // ── 3-3. 규칙 설정 모달 ──
            var RULE_LABELS = {
                numbering_continuity: '번호 체계 연속성',
                table_caption: '표 캡션 존재',
                figure_caption: '그림 캡션 존재',
                forbidden_terms: '금지 용어 감지',
                inconsistent_terms: '용어 일관성',
                sentence_length: '문장 길이 제한'
            };

            var RULE_CATEGORIES = {
                numbering_continuity: '구조 검사',
                table_caption: '구조 검사',
                figure_caption: '구조 검사',
                forbidden_terms: '용어 검사',
                inconsistent_terms: '용어 검사',
                sentence_length: '가독성 검사'
            };

            var SEVERITY_LABELS = { error: '오류', warning: '경고', suggestion: '제안' };

            vdSettingsBtn.addEventListener('click', function() {
                openRulesModal();
            });

            function openRulesModal() {
                // 서버에서 규칙 로드
                fetch(API_BASE + '/compare/rules', { credentials: 'include' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    showRulesModal(data);
                })
                .catch(function(err) {
                    alert('규칙 로드 실패: ' + err.message);
                });
            }

            function showRulesModal(rulesData) {
                var overlay = document.createElement('div');
                overlay.className = 'vd-modal-overlay';

                var presets = rulesData.presets || {};
                var activePreset = rulesData.active_preset || 'technical';
                var currentRules = JSON.parse(JSON.stringify(presets[activePreset] || {}));

                function buildBody() {
                    var rules = currentRules.rules || {};

                    // 카테고리별 그룹화
                    var groups = {};
                    var groupOrder = ['구조 검사', '용어 검사', '가독성 검사'];
                    for (var ruleId in RULE_LABELS) {
                        var cat = RULE_CATEGORIES[ruleId];
                        if (!groups[cat]) groups[cat] = [];
                        groups[cat].push(ruleId);
                    }

                    var html = '';
                    for (var gi = 0; gi < groupOrder.length; gi++) {
                        var groupName = groupOrder[gi];
                        var ruleIds = groups[groupName];
                        if (!ruleIds) continue;

                        html += '<div class="vd-rule-group">'
                            + '<div class="vd-rule-group-title">' + groupName + '</div>';

                        for (var ri = 0; ri < ruleIds.length; ri++) {
                            var ruleId = ruleIds[ri];
                            var rule = rules[ruleId] || { enabled: false, severity: 'warning' };

                            html += '<div class="vd-rule-row" data-rule-id="' + ruleId + '">'
                                + '<span class="vd-rule-name">' + RULE_LABELS[ruleId] + '</span>'
                                + '<select class="form-select form-select-sm vd-rule-severity" data-rule-severity="' + ruleId + '">'
                                + '<option value="error"' + (rule.severity === 'error' ? ' selected' : '') + '>오류</option>'
                                + '<option value="warning"' + (rule.severity === 'warning' ? ' selected' : '') + '>경고</option>'
                                + '<option value="suggestion"' + (rule.severity === 'suggestion' ? ' selected' : '') + '>제안</option>'
                                + '</select>'
                                + '<button class="vd-rule-toggle' + (rule.enabled ? ' on' : '') + '" data-rule-toggle="' + ruleId + '"></button>'
                                + '</div>';

                            // 파라미터 표시
                            if (ruleId === 'sentence_length' && rule.params) {
                                html += '<div class="vd-rule-param">'
                                    + '최대 <input type="number" class="form-input form-input-sm" data-rule-param="sentence_length.max_chars" value="' + (rule.params.max_chars || 80) + '"> 자'
                                    + '</div>';
                            }

                            // 금지 용어 편집 패널
                            if (ruleId === 'forbidden_terms') {
                                var terms = (rule.params && rule.params.terms) || [];
                                html += '<div class="vd-terms-panel" data-terms-for="forbidden_terms">';
                                html += '<div class="vd-terms-list">';
                                if (terms.length === 0) {
                                    html += '<div class="vd-terms-empty">등록된 금지 용어가 없습니다</div>';
                                } else {
                                    for (var ti = 0; ti < terms.length; ti++) {
                                        html += '<div class="vd-term-row" data-term-index="' + ti + '">'
                                            + '<span class="vd-term-text">' + escapeHTML(terms[ti].term) + '</span>'
                                            + '<span class="vd-term-arrow">&rarr;</span>'
                                            + '<span class="vd-term-replacement">' + escapeHTML(terms[ti].replacement) + '</span>'
                                            + '<button class="vd-term-remove" data-remove-term="' + ti + '" title="삭제">&times;</button>'
                                            + '</div>';
                                    }
                                }
                                html += '</div>';
                                html += '<div class="vd-term-add">'
                                    + '<input type="text" class="form-input form-input-sm" placeholder="금지어" data-add-forbidden-term>'
                                    + '<span class="vd-term-arrow">&rarr;</span>'
                                    + '<input type="text" class="form-input form-input-sm" placeholder="대체어" data-add-forbidden-replacement>'
                                    + '<button class="vd-term-add-btn" data-add-forbidden-btn title="추가">+</button>'
                                    + '</div>';
                                html += '</div>';
                            }

                            // 용어 일관성 그룹 편집 패널
                            if (ruleId === 'inconsistent_terms') {
                                var groups = (rule.params && rule.params.groups) || [];
                                html += '<div class="vd-terms-panel" data-terms-for="inconsistent_terms">';
                                html += '<div class="vd-terms-list">';
                                if (groups.length === 0) {
                                    html += '<div class="vd-terms-empty">등록된 용어 그룹이 없습니다</div>';
                                } else {
                                    for (var gi2 = 0; gi2 < groups.length; gi2++) {
                                        html += '<div class="vd-term-row" data-group-index="' + gi2 + '">'
                                            + '<div class="vd-group-tags">';
                                        for (var gti = 0; gti < groups[gi2].length; gti++) {
                                            html += '<span class="vd-group-tag">' + escapeHTML(groups[gi2][gti]) + '</span>';
                                        }
                                        html += '</div>'
                                            + '<button class="vd-term-remove" data-remove-group="' + gi2 + '" title="삭제">&times;</button>'
                                            + '</div>';
                                    }
                                }
                                html += '</div>';
                                html += '<div class="vd-term-add">'
                                    + '<input type="text" class="form-input form-input-sm" placeholder="쉼표로 구분 (예: 항공기, 비행기)" data-add-group-input style="flex:3">'
                                    + '<button class="vd-term-add-btn" data-add-group-btn title="추가">+</button>'
                                    + '</div>';
                                html += '</div>';
                            }
                        }
                        html += '</div>';
                    }
                    return html;
                }

                var modalHTML = '<div class="vd-modal">'
                    + '<div class="vd-modal-header"><span>검증 규칙 설정</span><button class="vd-modal-close">&times;</button></div>'
                    + '<div class="vd-modal-body">'
                    + '<div class="vd-preset-row">'
                    + '<span>프리셋:</span>'
                    + '<select class="form-select form-select-sm vd-preset-select" id="vd-preset-select">';

                for (var pKey in presets) {
                    modalHTML += '<option value="' + pKey + '"' + (pKey === activePreset ? ' selected' : '') + '>'
                        + escapeHTML(presets[pKey].label || pKey) + '</option>';
                }

                modalHTML += '</select></div>'
                    + '<div id="vd-rules-body">' + buildBody() + '</div>'
                    + '</div>'
                    + '<div class="vd-modal-footer">'
                    + '<button class="vd-modal-btn" id="vd-modal-cancel">취소</button>'
                    + '<button class="vd-modal-btn primary" id="vd-modal-apply">적용 + 재검증</button>'
                    + '</div></div>';

                overlay.innerHTML = modalHTML;
                document.body.appendChild(overlay);

                // 이벤트
                var modal = overlay.querySelector('.vd-modal');
                var presetSelect = overlay.querySelector('#vd-preset-select');
                var rulesBody = overlay.querySelector('#vd-rules-body');

                function closeModal() {
                    overlay.remove();
                }

                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closeModal();
                });
                overlay.querySelector('.vd-modal-close').addEventListener('click', closeModal);
                overlay.querySelector('#vd-modal-cancel').addEventListener('click', closeModal);

                // ESC 닫기
                function onEsc(e) {
                    if (e.key === 'Escape') closeModal();
                }
                document.addEventListener('keydown', onEsc);
                var origClose = closeModal;
                closeModal = function() {
                    document.removeEventListener('keydown', onEsc);
                    origClose();
                };

                // 프리셋 변경
                presetSelect.addEventListener('change', function() {
                    activePreset = presetSelect.value;
                    currentRules = JSON.parse(JSON.stringify(presets[activePreset] || {}));
                    rulesBody.innerHTML = buildBody();
                    bindRuleEvents();
                });

                function bindRuleEvents() {
                    // 토글 버튼
                    rulesBody.querySelectorAll('.vd-rule-toggle').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var ruleId = btn.getAttribute('data-rule-toggle');
                            btn.classList.toggle('on');
                            if (currentRules.rules && currentRules.rules[ruleId]) {
                                currentRules.rules[ruleId].enabled = btn.classList.contains('on');
                            }
                        });
                    });

                    // 심각도 변경
                    rulesBody.querySelectorAll('.vd-rule-severity').forEach(function(sel) {
                        sel.addEventListener('change', function() {
                            var ruleId = sel.getAttribute('data-rule-severity');
                            if (currentRules.rules && currentRules.rules[ruleId]) {
                                currentRules.rules[ruleId].severity = sel.value;
                            }
                        });
                    });

                    // 파라미터 변경
                    rulesBody.querySelectorAll('[data-rule-param]').forEach(function(input) {
                        input.addEventListener('change', function() {
                            var parts = input.getAttribute('data-rule-param').split('.');
                            var ruleId = parts[0];
                            var paramKey = parts[1];
                            if (currentRules.rules && currentRules.rules[ruleId] && currentRules.rules[ruleId].params) {
                                currentRules.rules[ruleId].params[paramKey] = parseInt(input.value, 10) || 80;
                            }
                        });
                    });

                    // ── 금지 용어 편집 ──
                    // 삭제
                    rulesBody.querySelectorAll('[data-remove-term]').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var idx = parseInt(btn.getAttribute('data-remove-term'), 10);
                            var rule = currentRules.rules && currentRules.rules.forbidden_terms;
                            if (rule && rule.params && rule.params.terms) {
                                rule.params.terms.splice(idx, 1);
                                rebuildAndBind();
                            }
                        });
                    });

                    // 추가
                    var addForbiddenBtn = rulesBody.querySelector('[data-add-forbidden-btn]');
                    if (addForbiddenBtn) {
                        var termInput = rulesBody.querySelector('[data-add-forbidden-term]');
                        var replInput = rulesBody.querySelector('[data-add-forbidden-replacement]');

                        function addForbiddenTerm() {
                            var term = termInput.value.trim();
                            var repl = replInput.value.trim();
                            if (!term) { termInput.focus(); return; }
                            if (!repl) { replInput.focus(); return; }
                            var rule = currentRules.rules && currentRules.rules.forbidden_terms;
                            if (rule) {
                                if (!rule.params) rule.params = { terms: [] };
                                if (!rule.params.terms) rule.params.terms = [];
                                // 중복 검사
                                var exists = rule.params.terms.some(function(t) { return t.term === term; });
                                if (exists) { termInput.focus(); termInput.select(); return; }
                                rule.params.terms.push({ term: term, replacement: repl });
                                rebuildAndBind();
                            }
                        }

                        addForbiddenBtn.addEventListener('click', addForbiddenTerm);
                        // Enter 키로 추가
                        [termInput, replInput].forEach(function(inp) {
                            inp.addEventListener('keydown', function(e) {
                                if (e.key === 'Enter') { e.preventDefault(); addForbiddenTerm(); }
                            });
                        });
                    }

                    // ── 용어 그룹 편집 ──
                    // 삭제
                    rulesBody.querySelectorAll('[data-remove-group]').forEach(function(btn) {
                        btn.addEventListener('click', function() {
                            var idx = parseInt(btn.getAttribute('data-remove-group'), 10);
                            var rule = currentRules.rules && currentRules.rules.inconsistent_terms;
                            if (rule && rule.params && rule.params.groups) {
                                rule.params.groups.splice(idx, 1);
                                rebuildAndBind();
                            }
                        });
                    });

                    // 추가
                    var addGroupBtn = rulesBody.querySelector('[data-add-group-btn]');
                    if (addGroupBtn) {
                        var groupInput = rulesBody.querySelector('[data-add-group-input]');

                        function addTermGroup() {
                            var raw = groupInput.value.trim();
                            if (!raw) { groupInput.focus(); return; }
                            var terms = raw.split(/[,，]/).map(function(t) { return t.trim(); }).filter(Boolean);
                            if (terms.length < 2) { groupInput.focus(); return; }
                            var rule = currentRules.rules && currentRules.rules.inconsistent_terms;
                            if (rule) {
                                if (!rule.params) rule.params = { groups: [] };
                                if (!rule.params.groups) rule.params.groups = [];
                                rule.params.groups.push(terms);
                                rebuildAndBind();
                            }
                        }

                        addGroupBtn.addEventListener('click', addTermGroup);
                        groupInput.addEventListener('keydown', function(e) {
                            if (e.key === 'Enter') { e.preventDefault(); addTermGroup(); }
                        });
                    }
                }

                function rebuildAndBind() {
                    rulesBody.innerHTML = buildBody();
                    bindRuleEvents();
                }

                bindRuleEvents();

                // 적용 + 재검증
                overlay.querySelector('#vd-modal-apply').addEventListener('click', function() {
                    // 현재 수정사항을 presets에 반영
                    presets[activePreset] = currentRules;
                    var saveData = { presets: presets, active_preset: activePreset };

                    fetch(API_BASE + '/compare/rules', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(saveData)
                    })
                    .then(function(res) {
                        if (!res.ok) throw new Error('저장 실패');
                        closeModal();
                        if (docState.a.paragraphs.length > 0) {
                            runValidation();
                        }
                    })
                    .catch(function(err) {
                        alert('규칙 저장 실패: ' + err.message);
                    });
                });
            }

        })();
    </script>
</body>
</html>
