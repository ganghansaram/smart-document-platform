<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare — Smart Document Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/scrollbar.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/platform-header.css">
    <script src="js/lib/jsdiff/diff.min.js"></script>
    <!-- platform-footer 불필요 (도구형 화면) -->
    <link rel="stylesheet" href="css/compare.css">
</head>
<body>

    <div class="compare-body" id="compare-body">
        <!-- 서브 헤더 (툴바) -->
        <div class="compare-toolbar" id="compare-toolbar">
            <button class="scroll-sync-btn" id="scroll-sync-btn" title="스크롤 동기화">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7h-4v10h4"/><path d="M16 7h4v10h-4"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                동기화
            </button>

            <div class="cp-nav-group" id="cp-nav-group" style="display:none">
                <button class="cp-nav-btn" id="nav-prev" title="이전 변경점 (↑)">&#9650;</button>
                <span class="cp-nav-indicator" id="nav-indicator">0/0</span>
                <button class="cp-nav-btn" id="nav-next" title="다음 변경점 (↓)">&#9660;</button>
            </div>

            <button class="scroll-sync-btn" id="swap-btn" style="display:none" title="A ↔ B 교체">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                A⇄B
            </button>

            <button class="scroll-sync-btn" id="edit-toggle-btn" style="display:none" title="텍스트 편집 모드">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                편집
            </button>

            <div class="cp-filter-group" id="cp-filter-group" style="display:none">
                <button class="scroll-sync-btn" id="filter-btn">필터</button>
                <div class="cp-filter-dropdown" id="cp-filter-dropdown" style="display:none">
                    <label><input type="checkbox" checked data-filter="added"> 추가</label>
                    <label><input type="checkbox" checked data-filter="deleted"> 삭제</label>
                    <label><input type="checkbox" checked data-filter="modified"> 수정</label>
                    <hr>
                    <label><input type="checkbox" data-filter="ignoreWhitespace"> 공백 무시</label>
                </div>
            </div>

            <!-- 검증 모드 전용 -->
            <div class="cp-nav-group" id="vd-nav-group" style="display:none">
                <button class="cp-nav-btn" id="vd-nav-prev" title="이전 이슈 (↑)">&#9650;</button>
                <span class="cp-nav-indicator" id="vd-nav-indicator">0/0</span>
                <button class="cp-nav-btn" id="vd-nav-next" title="다음 이슈 (↓)">&#9660;</button>
            </div>

            <div class="cp-filter-group" id="vd-filter-group" style="display:none">
                <button class="scroll-sync-btn" id="vd-filter-btn">필터</button>
                <div class="cp-filter-dropdown" id="vd-filter-dropdown" style="display:none">
                    <label><input type="checkbox" checked data-vd-filter="error"> 오류</label>
                    <label><input type="checkbox" checked data-vd-filter="warning"> 경고</label>
                    <label><input type="checkbox" checked data-vd-filter="suggestion"> 제안</label>
                </div>
            </div>

            <button class="scroll-sync-btn" id="vd-settings-btn" style="display:none" title="검증 규칙 설정">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                규칙
            </button>

            <button class="scroll-sync-btn" id="vd-revalidate-btn" style="display:none" title="재검증">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                재검증
            </button>

            <span class="toolbar-spacer"></span>
            <span class="toolbar-label" id="toolbar-hint">문서 두 개를 업로드하여 비교하세요</span>
        </div>

        <!-- 메인: Grid (패널영역 | 사이드바) -->
        <div class="compare-main" id="compare-main">
            <!-- 패널 컨테이너 (Translator viewer-panels 패턴) -->
            <div class="cp-panels" id="cp-panels">
                <input type="file" id="file-input-a" accept=".docx,.pdf" style="display:none">
                <input type="file" id="file-input-b" accept=".docx,.pdf" style="display:none">

                <div class="compare-panel panel-a" id="panel-a">
                    <div class="cp-panel-header">
                        <span class="cp-panel-label" id="panel-label-a">
                            <span class="cp-label-text" id="label-text-a">문서 A</span>
                            <button class="cp-file-remove" id="file-remove-a" title="파일 제거">&times;</button>
                        </span>
                    </div>
                    <div class="cp-panel-body" id="panel-body-a">
                        <div class="panel-placeholder" id="placeholder-a">
                            <svg class="panel-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="12" y1="18" x2="12" y2="12"/>
                                <line x1="9" y1="15" x2="15" y2="15"/>
                            </svg>
                            <span class="panel-placeholder-desc">파일을 드래그하거나</span>
                            <button class="btn btn-primary placeholder-upload-btn" data-action="upload" data-side="a">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                파일 선택
                            </button>
                            <span class="placeholder-or">또는</span>
                            <button class="placeholder-paste-link" data-action="paste" data-side="a">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                                텍스트 붙여넣기
                            </button>
                            <span class="placeholder-hint">.docx, .pdf 지원</span>
                        </div>
                    </div>
                </div>

                <div class="compare-panel panel-b" id="panel-b">
                    <div class="cp-panel-header">
                        <span class="cp-panel-label" id="panel-label-b">
                            <span class="cp-label-text" id="label-text-b">문서 B</span>
                            <button class="cp-file-remove" id="file-remove-b" title="파일 제거">&times;</button>
                        </span>
                    </div>
                    <div class="cp-panel-body" id="panel-body-b">
                        <div class="panel-placeholder" id="placeholder-b">
                            <svg class="panel-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="12" y1="18" x2="12" y2="12"/>
                                <line x1="9" y1="15" x2="15" y2="15"/>
                            </svg>
                            <span class="panel-placeholder-desc">파일을 드래그하거나</span>
                            <button class="btn btn-primary placeholder-upload-btn" data-action="upload" data-side="b">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                파일 선택
                            </button>
                            <span class="placeholder-or">또는</span>
                            <button class="placeholder-paste-link" data-action="paste" data-side="b">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
                                텍스트 붙여넣기
                            </button>
                            <span class="placeholder-hint">.docx, .pdf 지원</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="resize-handle" id="resize-handle"></div>
            <div class="cp-sidebar" id="cp-sidebar">
                <div class="cp-sidebar-header">
                    <span class="cp-sidebar-title" id="cp-sidebar-title">변경 목록</span>
                    <button class="cp-sidebar-collapse" id="cp-sidebar-collapse" title="접기">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"/>
                        </svg>
                    </button>
                </div>
                <div class="cp-sidebar-body" id="cp-sidebar-body">
                    <div class="cp-sidebar-empty" id="cp-sidebar-empty">
                        비교 결과가 여기에 표시됩니다
                    </div>
                </div>
            </div>

            <button class="cp-sidebar-restore" id="cp-sidebar-restore" title="사이드바 열기"></button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/platform-header.js"></script>
    <script>
        (function() {
            'use strict';

            var currentMode = 'compare'; // 'compare' | 'verify'
            var sidebarOpen = true;
            var sidebarWidth = 280; // px, 리사이즈 가능
            var SIDEBAR_MIN = 180;
            var SIDEBAR_MAX = 700;
            var API_BASE = (window.DISPLAY_CONFIG && DISPLAY_CONFIG.API_BASE) || 'http://localhost:8000/api';

            // ── 문서 상태 ──
            var docState = {
                a: { file: null, text: null, paragraphs: [], filename: '' },
                b: { file: null, text: null, paragraphs: [], filename: '' }
            };

            // ── DOM 참조 ──
            var compareMain = document.getElementById('compare-main');
            var cpPanels = document.getElementById('cp-panels');
            var panelA = document.getElementById('panel-a');
            var panelB = document.getElementById('panel-b');
            var panelBodyA = document.getElementById('panel-body-a');
            var panelBodyB = document.getElementById('panel-body-b');
            var sidebar = document.getElementById('cp-sidebar');
            var sidebarTitle = document.getElementById('cp-sidebar-title');
            var sidebarEmpty = document.getElementById('cp-sidebar-empty');
            var sidebarCollapse = document.getElementById('cp-sidebar-collapse');
            var sidebarRestore = document.getElementById('cp-sidebar-restore');
            var resizeHandle = document.getElementById('resize-handle');
            var labelA = document.getElementById('label-text-a');
            var labelB = document.getElementById('label-text-b');
            var fileInputA = document.getElementById('file-input-a');
            var fileInputB = document.getElementById('file-input-b');
            var fileRemoveA = document.getElementById('file-remove-a');
            var fileRemoveB = document.getElementById('file-remove-b');
            var scrollSyncBtn = document.getElementById('scroll-sync-btn');

            // Scroll sync (기본 OFF — 비교 시 독립 스크롤이 기본)
            var scrollSyncEnabled = false;
            var scrollSyncing = false;

            // ── 모드 토글 빌드 ──
            var modeToggle = document.createElement('div');
            modeToggle.className = 'mode-toggle';

            var btnCompare = document.createElement('button');
            btnCompare.className = 'mode-toggle-btn active';
            btnCompare.type = 'button';
            btnCompare.textContent = '비교';

            var btnVerify = document.createElement('button');
            btnVerify.className = 'mode-toggle-btn';
            btnVerify.type = 'button';
            btnVerify.textContent = '검증';

            modeToggle.appendChild(btnCompare);
            modeToggle.appendChild(btnVerify);

            // ── 유틸리티 ──
            function escapeHTML(str) {
                var div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getPanel(side) { return side === 'a' ? panelBodyA : panelBodyB; }
            function getPanelRoot(side) { return side === 'a' ? panelA : panelB; }
            function getLabel(side) { return side === 'a' ? labelA : labelB; }
            function getRemoveBtn(side) { return side === 'a' ? fileRemoveA : fileRemoveB; }
            function getFileInput(side) { return side === 'a' ? fileInputA : fileInputB; }

            // ── Placeholder HTML ──
            var PLACEHOLDER_SVG = '<svg class="panel-placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>';

            function getDefaultLabel(side) {
                if (side === 'a') return currentMode === 'verify' ? '검증 문서' : '문서 A';
                return '문서 B';
            }

            var UPLOAD_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
            var PASTE_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>';

            function makePlaceholderHTML(side) {
                return '<div class="panel-placeholder" id="placeholder-' + side + '">'
                    + PLACEHOLDER_SVG
                    + '<span class="panel-placeholder-desc">파일을 드래그하거나</span>'
                    + '<button class="btn btn-primary placeholder-upload-btn" data-action="upload" data-side="' + side + '">'
                    + UPLOAD_ICON + ' 파일 선택</button>'
                    + '<span class="placeholder-or">또는</span>'
                    + '<button class="placeholder-paste-link" data-action="paste" data-side="' + side + '">'
                    + PASTE_ICON + ' 텍스트 붙여넣기</button>'
                    + '<span class="placeholder-hint">.docx, .pdf 지원</span>'
                    + '</div>';
            }

            // ── 패널 콘텐츠 렌더링 ──
            function renderParagraphs(panel, paragraphs) {
                // placeholder 제거, 텍스트 콘텐츠 삽입
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var old = panel.querySelector('.cp-text-content');
                if (old) old.remove();

                var html = '<div class="cp-text-content">';
                for (var i = 0; i < paragraphs.length; i++) {
                    html += '<div class="cp-paragraph" data-index="' + i + '">'
                        + escapeHTML(paragraphs[i]) + '</div>';
                }
                html += '</div>';
                panel.insertAdjacentHTML('beforeend', html);
            }

            function showLoading(panel) {
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                panel.insertAdjacentHTML('beforeend',
                    '<div class="cp-upload-loading">'
                    + '<div class="spinner cp-upload-spinner"></div>'
                    + '<span>텍스트 추출 중...</span></div>');
            }

            function restorePlaceholder(side) {
                var panel = getPanel(side);
                var label = getLabel(side);
                var removeBtn = getRemoveBtn(side);

                // 기존 콘텐츠 제거 (label, remove 버튼 제외)
                var content = panel.querySelector('.cp-text-content');
                if (content) content.remove();
                var loading = panel.querySelector('.cp-upload-loading');
                if (loading) loading.remove();
                var paste = panel.querySelector('.cp-paste-container');
                if (paste) paste.remove();
                var oldPh = panel.querySelector('.panel-placeholder');
                if (oldPh) oldPh.remove();

                // placeholder 삽입
                panel.insertAdjacentHTML('beforeend', makePlaceholderHTML(side));
                bindPlaceholderEvents(side);

                // 상태 초기화
                docState[side] = { file: null, text: null, paragraphs: [], filename: '' };
                label.textContent = getDefaultLabel(side);
                label.title = '';
                removeBtn.classList.remove('visible');
                clearDiff();
                clearValidation();
            }

            // ── Diff 상태 ──
            var diffState = {
                changes: [],
                currentIndex: -1,
                filter: { added: true, deleted: true, modified: true },
                ignoreWhitespace: false
            };

            var editMode = false;

            // ── Diff DOM 참조 ──
            var navGroup = document.getElementById('cp-nav-group');
            var navPrev = document.getElementById('nav-prev');
            var navNext = document.getElementById('nav-next');
            var navIndicator = document.getElementById('nav-indicator');
            var swapBtn = document.getElementById('swap-btn');
            var editToggleBtn = document.getElementById('edit-toggle-btn');
            var filterGroup = document.getElementById('cp-filter-group');
            var filterBtn = document.getElementById('filter-btn');
            var filterDropdown = document.getElementById('cp-filter-dropdown');
            var sidebarBody = document.getElementById('cp-sidebar-body');

            // ── 문서 로드 완료 처리 ──
            function onDocumentLoaded(side, filename, paragraphs) {
                var panel = getPanel(side);
                var label = getLabel(side);
                var removeBtn = getRemoveBtn(side);

                docState[side] = {
                    file: null,
                    text: paragraphs.join('\n'),
                    paragraphs: paragraphs,
                    filename: filename
                };

                label.textContent = filename;
                label.title = filename;
                removeBtn.classList.add('visible');
                renderParagraphs(panel, paragraphs);
                tryRunDiff();
                tryRunValidation();
            }

            // ── 파일 업로드 처리 ──
            function uploadFile(side, file) {
                if (!file) return;

                var ext = file.name.split('.').pop().toLowerCase();
                if (ext !== 'docx' && ext !== 'pdf') {
                    alert('지원하지 않는 형식입니다.\n허용: .docx, .pdf');
                    return;
                }

                var panel = getPanel(side);
                showLoading(panel);

                var formData = new FormData();
                formData.append('file', file);

                fetch(API_BASE + '/compare/upload', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                })
                .then(function(res) {
                    if (!res.ok) {
                        return res.json().then(function(err) {
                            throw new Error(err.detail || '업로드 실패');
                        });
                    }
                    return res.json();
                })
                .then(function(data) {
                    onDocumentLoaded(side, data.filename, data.paragraphs);
                })
                .catch(function(err) {
                    restorePlaceholder(side);
                    alert('업로드 오류: ' + err.message);
                });
            }

            // ── 텍스트 붙여넣기 모드 ──
            function showPasteMode(side) {
                var panel = getPanel(side);

                // placeholder 제거
                var ph = panel.querySelector('.panel-placeholder');
                if (ph) ph.remove();

                var html = '<div class="cp-paste-container">'
                    + '<div class="cp-paste-header">'
                    + '<span class="cp-paste-hint">텍스트를 붙여넣으세요 (Ctrl+V)</span>'
                    + '<button class="cp-paste-btn" data-paste-cancel="' + side + '">취소</button>'
                    + '<button class="cp-paste-btn primary" data-paste-confirm="' + side + '">확인</button>'
                    + '</div>'
                    + '<textarea class="form-textarea cp-paste-textarea" id="paste-textarea-' + side + '" placeholder="여기에 텍스트를 붙여넣으세요..."></textarea>'
                    + '</div>';
                panel.insertAdjacentHTML('beforeend', html);

                // textarea 포커스
                var textarea = document.getElementById('paste-textarea-' + side);
                if (textarea) textarea.focus();
            }

            function confirmPaste(side) {
                var textarea = document.getElementById('paste-textarea-' + side);
                if (!textarea) return;

                var text = textarea.value.trim();
                if (!text) {
                    alert('텍스트를 입력해주세요.');
                    return;
                }

                // 단락 분리: 빈 줄 기준, 없으면 줄바꿈 기준
                var paragraphs;
                if (text.indexOf('\n\n') !== -1) {
                    paragraphs = text.split(/\n\n+/);
                } else {
                    paragraphs = text.split(/\n/);
                }
                paragraphs = paragraphs.filter(function(p) { return p.trim(); });

                if (paragraphs.length === 0) {
                    alert('텍스트를 입력해주세요.');
                    return;
                }

                onDocumentLoaded(side, '붙여넣기 텍스트', paragraphs);
            }

            function cancelPaste(side) {
                restorePlaceholder(side);
            }

            // ── 이벤트 위임: placeholder 버튼 + paste 버튼 ──
            cpPanels.addEventListener('click', function(e) {
                var btn = e.target.closest('[data-action]');
                if (btn) {
                    var action = btn.getAttribute('data-action');
                    var side = btn.getAttribute('data-side');
                    if (action === 'upload') {
                        getFileInput(side).click();
                    } else if (action === 'paste') {
                        showPasteMode(side);
                    }
                    return;
                }

                var confirmBtn = e.target.closest('[data-paste-confirm]');
                if (confirmBtn) {
                    confirmPaste(confirmBtn.getAttribute('data-paste-confirm'));
                    return;
                }

                var cancelBtn = e.target.closest('[data-paste-cancel]');
                if (cancelBtn) {
                    cancelPaste(cancelBtn.getAttribute('data-paste-cancel'));
                    return;
                }
            });

            // ── Drag & Drop 바인딩 ──
            function bindPlaceholderEvents(side) {
                var placeholder = document.getElementById('placeholder-' + side);
                if (!placeholder) return;

                placeholder.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    placeholder.classList.add('dragover');
                });

                placeholder.addEventListener('dragleave', function() {
                    placeholder.classList.remove('dragover');
                });

                placeholder.addEventListener('drop', function(e) {
                    e.preventDefault();
                    placeholder.classList.remove('dragover');
                    var files = e.dataTransfer.files;
                    if (files.length > 0) uploadFile(side, files[0]);
                });
            }

            // 패널 전체에 drag-drop (파일 교체 지원)
            function bindPanelDragDrop(side) {
                var panel = getPanel(side);

                panel.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    var placeholder = document.getElementById('placeholder-' + side);
                    if (placeholder) placeholder.classList.add('dragover');
                });

                panel.addEventListener('dragleave', function(e) {
                    // 패널 밖으로 나갔을 때만
                    if (!panel.contains(e.relatedTarget)) {
                        var placeholder = document.getElementById('placeholder-' + side);
                        if (placeholder) placeholder.classList.remove('dragover');
                    }
                });

                panel.addEventListener('drop', function(e) {
                    e.preventDefault();
                    var placeholder = document.getElementById('placeholder-' + side);
                    if (placeholder) placeholder.classList.remove('dragover');
                    var files = e.dataTransfer.files;
                    if (files.length > 0) uploadFile(side, files[0]);
                });
            }

            // file input change 이벤트
            fileInputA.addEventListener('change', function() {
                if (fileInputA.files.length > 0) uploadFile('a', fileInputA.files[0]);
                fileInputA.value = '';
            });
            fileInputB.addEventListener('change', function() {
                if (fileInputB.files.length > 0) uploadFile('b', fileInputB.files[0]);
                fileInputB.value = '';
            });

            // 파일 제거 버튼
            fileRemoveA.addEventListener('click', function() { restorePlaceholder('a'); });
            fileRemoveB.addEventListener('click', function() { restorePlaceholder('b'); });

            // 초기 이벤트 바인딩
            bindPlaceholderEvents('a');
            bindPlaceholderEvents('b');

            bindPanelDragDrop('b');

            // ── 그리드 레이아웃 갱신 ──
            function updateGrid() {
                if (sidebarOpen) {
                    compareMain.style.gridTemplateColumns = '1fr 4px ' + sidebarWidth + 'px';
                    resizeHandle.style.display = '';
                } else {
                    compareMain.style.gridTemplateColumns = '1fr 0 0';

                }
            }

            // ── 모드 전환 ──
            function setMode(mode) {
                if (mode === currentMode) return;
                currentMode = mode;

                var body = document.getElementById('compare-body');
                body.className = 'compare-body mode-' + mode;

                btnCompare.classList.toggle('active', mode === 'compare');
                btnVerify.classList.toggle('active', mode === 'verify');

                }

                // 라벨 변경 (파일이 로드된 경우 파일명 유지)
                if (!docState.a.filename) {

                }
                if (!docState.b.filename) {

                // 사이드바 타이틀/빈 메시지 변경

                    sidebarEmpty.textContent = '비교 결과가 여기에 표시됩니다';
                } else {

                    sidebarEmpty.textContent = '검증 결과가 여기에 표시됩니다';

                // 비교 모드 전용 UI (scrollSync만 항상 표시, swap/edit는 diff 결과에 따라)
                scrollSyncBtn.style.display = mode === 'compare' ? '' : 'none';

                // 모드 전환 시 하이라이트 정리 + 재실행
                if (mode === 'verify') {
                    clearDiff();

                    vdSettingsBtn.style.display = '';
                    vdRevalidateBtn.style.display = '';

                    clearValidation();

                    vdFilterGroup.style.display = 'none';
                    vdSettingsBtn.style.display = 'none';
                    vdRevalidateBtn.style.display = 'none';
                    if (editMode) toggleEditMode();
                    tryRunDiff();

                updateGrid();
            }

            btnCompare.addEventListener('click', function() { setMode('compare'); });
            btnVerify.addEventListener('click', function() { setMode('verify'); });

            // 초기 모드 적용
            document.getElementById('compare-body').classList.add('mode-compare');

            // ── 사이드바 접기/펼치기 ──
            function collapseSidebar() {
                sidebarOpen = false;
                sidebar.style.overflow = 'hidden';
                sidebarRestore.classList.add('visible');
                updateGrid();
            }

            function expandSidebar() {
