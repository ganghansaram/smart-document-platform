<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Knowledge Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/tokens.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(150deg, #060c1a 0%, #0e1f40 45%, #091530 75%, #040a14 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
        }

        /* 배경 미세 격자 패턴 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* 중심부 브리딩 효과 */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 45%, rgba(30,80,90) 0%, transparent 65%);
            animation: breathing 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes breathing {
            0%, 100% { opacity: 0.1; }
            50%      { opacity: 1; }
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 400px;
            max-width: 92vw;
        }

        /* 상단 브랜딩 (카드 밖) */
        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-brand-logo {
            height: 50px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .login-brand-title {
            font-size: 26px;
            font-weight: 700;
            color: #e8edf5;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .login-brand-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 로그인 카드 */
        .login-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 36px 40px 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0,0,0,0.3);
        }

        .login-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 22px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #dde2ec;
            border-radius: 6px;
            font-size: 14px;
            color: #1a1a2e;
            background: #f8faff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2c5282;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.12);
        }

        .error-msg {
            display: none;
            color: #c53030;
            font-size: 13px;
            text-align: center;
            margin: 8px 0 4px;
            padding: 8px 12px;
            background: #fff5f5;
            border-radius: 5px;
            border: 1px solid #fed7d7;
        }

        .error-msg.visible {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 13px 0;
            margin-top: 10px;
            background: #1e3a6e;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: background 0.15s, opacity 0.15s;
        }

        .login-btn:hover:not(:disabled) {
            background: #2c5282;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 로그인 성공 버튼 피드백 */
        .login-btn.success {
            background: #276749;
            opacity: 1;
        }

        /* 페이지 전환 fade-out */
        body.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* 공지 영역 */
        .login-notice {
            margin-top: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 7px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.8;
        }

        .login-notice ul {
            padding-left: 14px;
        }

        .login-notice a {
            color: rgba(130,180,255,0.75);
            text-decoration: none;
        }

        .login-notice a:hover {
            color: rgba(130,180,255,1);
            text-decoration: underline;
        }

        /* 하단 서명 */
        .login-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-brand">
            <img src="css/images/kai_logo.png" alt="KAI" class="login-brand-logo">
            <div class="login-brand-title">Smart Knowledge Platform</div>
            <div class="login-brand-sub">Authorized Access Only</div>
        </div>

        <div class="login-card">
            <h2>로그인</h2>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" autocomplete="username" placeholder="사용자명 입력">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" placeholder="비밀번호 입력">
            </div>
            <div class="error-msg" id="login-error"></div>
            <button class="login-btn" id="login-btn">로그인</button>
        </div>

        <div class="login-notice">
            <ul>
                <li>계정이 없으신 경우 시스템 관리자에게 신청하세요.</li>
                <li>비밀번호를 분실하신 경우 관리자에게 초기화를 요청하세요.</li>
                <li>T: 055-851-4192 / M: 010-5067-2180</li>
                <li>E-mail: <a href="mailto:huiseok.ahn@koreaaero.com">huiseok.ahn@koreaaero.com</a></li>
            </ul>
        </div>

        <div class="login-footer">© 2025 Korea Aerospace Industries, Ltd. · Smart Knowledge Platform</div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // 플랫폼 타이틀은 고정 (런타임 설정 오버라이드 없음)

        var _backendUrl = (typeof AUTH_CONFIG !== 'undefined' && AUTH_CONFIG.backendUrl)
            ? AUTH_CONFIG.backendUrl : 'http://localhost:8000';

        var usernameInput = document.getElementById('username');
        var passwordInput = document.getElementById('password');
        var errorEl       = document.getElementById('login-error');
        var loginBtn      = document.getElementById('login-btn');

        // siteTitle 런타임 오버라이드 제거 — 플랫폼 타이틀은 고정

        // 이미 로그인돼 있으면 즉시 이동
        fetch(_backendUrl + '/api/auth/me', { credentials: 'include' })
            .then(function(r) { return r.json(); })
            .then(function(d) {
                if (d.user) window.location.replace('launcher.html');
                else usernameInput.focus();
            })
            .catch(function() { usernameInput.focus(); });

        async function doLogin() {
            var username = usernameInput.value.trim();
            var password = passwordInput.value;

            if (!username || !password) {
                showError('사용자명과 비밀번호를 입력하세요.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '...';
            errorEl.classList.remove('visible');

            try {
                var response = await fetch(_backendUrl + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username: username, password: password })
                });

                if (response.ok) {
                    // 버튼 성공 피드백
                    loginBtn.textContent = '\u2713';
                    loginBtn.classList.add('success');

                    // 잠시 후 fade-out → 페이지 전환
                    setTimeout(function() {
                        document.body.classList.add('fade-out');
                        setTimeout(function() {
                            window.location.replace('launcher.html');
                        }, 400);
                    }, 300);
                    return;
                } else {
                    var err = await response.json();
                    showError(err.detail || '로그인에 실패했습니다.');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '로그인';
                }
            } catch (e) {
                showError('서버에 연결할 수 없습니다.');
                loginBtn.disabled = false;
                loginBtn.textContent = '로그인';
            }
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('visible');
        }

        loginBtn.addEventListener('click', doLogin);
        passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
        usernameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') passwordInput.focus(); });
    </script>
</body>
</html>
