<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Document Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/platform-header.css">
    <link rel="stylesheet" href="css/platform-footer.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            color: #fff;
            overflow: hidden;
            background: #0a1628;
            visibility: hidden;
        }

        /* ── 비디오 배경 ── */
        .bg-video {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .bg-video::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
        }

        /* ── 헤더 투명 오버라이드 ── */
        .platform-header {
            position: relative;
            z-index: 2;
            background: transparent !important;
            box-shadow: none !important;
        }

        /* ── 메인 ── */
        .launcher-main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px 60px;
        }

        /* 상징 문구 */
        .hero-phrase {
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            letter-spacing: -1px;
            margin-bottom: 56px;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.4);
            line-height: 1.2;
        }

        .hero-phrase span {
            display: block;
            font-size: 16px;
            font-weight: 400;
            color: #fff;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 12px;
            text-shadow: none;
        }

        /* ── 시스템 카드 ── */
        .system-cards {
            display: flex;
            gap: 32px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .system-card {
            width: 240px;
            padding: 40px 28px;
            text-align: center;
            border-radius: 12px;
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s, transform 0.3s;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .system-card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-4px);
        }

        .system-card h3 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
        }

        .system-card-desc {
            font-size: 13px;
            font-weight: 400;
            color: #fff;
            line-height: 1.5;
        }

        .system-card.disabled {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .system-card.disabled:hover {
            border-color: transparent;
            background: none;
            transform: none;
        }

        .system-card-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .system-card-badge.dev {
            background: rgba(245, 158, 11, 0.7);
            color: #fff;
        }

        /* ── 푸터 투명 오버라이드 ── */
        .platform-footer {
            position: relative;
            z-index: 2;
            background: transparent !important;
            border-top-color: transparent !important;
            color: rgba(255, 255, 255, 0.25) !important;
        }

        .platform-footer a {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        /* ── 페이지 전환 ── */
        body.fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        body.fade-out {
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- 비디오 배경 -->
    <div class="bg-video">
        <video autoplay muted loop playsinline>
            <source src="css/images/cloud.mp4" type="video/mp4">
        </video>
    </div>

    <div class="launcher-main">
        <div class="hero-phrase">
            Knowledge at Your Fingertips
            <span>Select a system to begin</span>
        </div>

        <div class="system-cards">
            <a class="system-card" id="card-explorer" href="index.html">
                <h3>Explorer</h3>
                <div class="system-card-desc">문서 탐색 · 검색 · AI 질의</div>
            </a>
            <a class="system-card" id="card-translator" href="translator.html">
                <h3>Translator</h3>
                <div class="system-card-desc">논문 번역 · PDF 뷰어</div>
            </a>
            <a class="system-card" id="card-compare" href="compare.html">
                <h3>Compare</h3>
                <div class="system-card-desc">문서 비교 · 규칙 검증</div>
                <span class="system-card-badge dev">개발중</span>
            </a>
        </div>
    </div>

    <div id="launcher-footer"></div>

    <script src="js/config.js"></script>
    <script src="js/platform-header.js"></script>
    <script src="js/platform-footer.js"></script>
    <script>
        initPlatformHeader({
            title: 'Smart Document Platform',
            currentSystem: 'platform',
            navItems: [],
            onAuth: function(user) {
                document.body.style.visibility = 'visible';
                document.body.classList.add('fade-in');
            }
        });

        // 카드 클릭 → fade-out 전환
        document.getElementById('card-explorer').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(function() { window.location.href = 'index.html'; }, 400);
        });

        document.getElementById('card-translator').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(function() { window.location.href = 'translator.html'; }, 400);
        });

        document.getElementById('card-compare').addEventListener('click', function(e) {
            e.preventDefault();
            document.body.classList.add('fade-out');
            setTimeout(function() { window.location.href = 'compare.html'; }, 400);
        });

        // 푸터
        initPlatformFooter('launcher-footer');
    </script>
</body>
</html>
