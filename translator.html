<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator — Smart Document Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/platform-header.css">
    <link rel="stylesheet" href="css/platform-footer.css">
    <link rel="stylesheet" href="css/tree-menu.css">
    <link rel="stylesheet" href="css/translator.css">
</head>
<body>
    <!-- page-nav: 뷰어 전용, platform-header midSlot에 삽입 -->
    <div class="translator-page-nav" id="page-nav" style="display:none">
        <button class="pn-btn" id="page-prev" title="이전 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="translator-page-info" id="page-info">1 / 1</span>
        <button class="pn-btn" id="page-next" title="다음 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <!-- Search Overlay -->
    <div class="ts-search-overlay" id="ts-search-overlay">
        <div class="ts-search-container">
            <input type="text" class="ts-search-input" id="ts-search-input" placeholder="문서 본문, 메모 검색..." autocomplete="off">
            <button class="ts-search-close" id="ts-search-close">&times;</button>
            <div class="ts-search-results" id="ts-search-results"></div>
        </div>
    </div>

    <div class="translator-body">
        <!-- Tree Panel: overlay -->
        <div class="tree-panel-overlay" id="tp-overlay">
            <div class="tp-header">
                <span class="tp-header-title">내 문서</span>
                <button class="tp-btn" id="tp-new-folder" title="새 폴더">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                </button>
                <button class="tp-btn" id="tp-pin" title="패널 고정">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76z"/></svg>
                </button>
            </div>
            <div class="tree-menu" id="tp-tree"></div>
        </div>

        <!-- Tree Panel: trigger handle -->
        <div class="tree-panel-trigger" id="tp-trigger"></div>

        <!-- Context Menu -->
        <div class="tp-context-menu" id="tp-ctx-menu"></div>

        <!-- Folder Picker Dialog -->
        <div class="folder-picker-overlay" id="fp-overlay">
            <div class="folder-picker" id="fp-dialog">
                <h3>이동할 폴더 선택</h3>
                <div class="folder-picker-list" id="fp-list"></div>
                <div class="folder-picker-actions">
                    <button class="fp-cancel" id="fp-cancel">취소</button>
                    <button class="fp-submit" id="fp-submit">이동</button>
                </div>
            </div>
        </div>

        <!-- State 1: Document List + Upload -->
        <div class="view-list" id="view-list">
            <!-- Hero Banner -->
            <div class="hero-banner">
                <img class="hero-banner-img" src="css/images/translator_home.png" alt="" decoding="async">
                <div class="hero-overlay">
                    <h2>Your Paper, Your Language</h2>
                </div>
                <div class="hero-features">
                    <span class="hero-feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                    </span>
                    <span class="hero-feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="8" height="18" rx="1"/><rect x="14" y="3" width="8" height="18" rx="1"/><path d="M6 8h0"/><path d="M6 12h0"/><path d="M18 8h0"/><path d="M18 12h0"/></svg>
                    </span>
                    <span class="hero-feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
                    </span>
                    <span class="hero-feature-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                </div>
                <div class="hero-banner-fade"></div>
            </div>
            <div class="upload-zone" id="upload-zone">
                <div class="upload-zone-icon">&#128196;</div>
                <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 업로드</div>
                <div class="upload-zone-hint">최대 100MB</div>
                <input type="file" id="file-input" accept=".pdf" multiple>
            </div>
            <div class="doc-grid" id="doc-grid"></div>
            <div id="translator-footer"></div>
        </div>

        <!-- State 2: Dual Panel Viewer -->
        <div class="view-viewer" id="view-viewer">
            <div class="viewer-toolbar" id="viewer-toolbar">
                <span class="zoom-controls">
                    <button class="zoom-btn" id="zoom-out" title="축소">&minus;</button>
                    <span class="zoom-level" id="zoom-level" title="클릭하면 100%로 초기화" style="cursor:pointer;">100%</span>
                    <button class="zoom-btn" id="zoom-in" title="확대">+</button>
                </span>
                <button class="scroll-sync-btn active" id="scroll-sync-btn" title="스크롤 동기화">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 7h-4v10h4"/><path d="M16 7h4v10h-4"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    동기화
                </button>
                <span class="spacer"></span>
                <span class="page-status-text" id="toolbar-page-status"></span>
                <select id="model-select"></select>
                <span class="engine-radio" id="engine-radio">
                    <label><input type="radio" name="translate-engine" value="pdf" checked> PDF</label>
                    <label><input type="radio" name="translate-engine" value="text"> 텍스트</label>
                </span>
                <span class="font-scale-controls" id="font-scale-controls" style="display:none">
                    <button class="font-scale-btn" id="font-scale-down" title="폰트 축소">A-</button>
                    <span class="font-scale-value" id="font-scale-value">100%</span>
                    <button class="font-scale-btn" id="font-scale-up" title="폰트 확대">A+</button>
                </span>
                <button class="translate-page-btn" id="translate-page-btn">이 페이지 번역</button>
                <button class="range-translate-btn" id="range-translate-btn">범위 번역</button>
                <button class="cancel-page-btn" id="cancel-page-btn" style="display:none">취소</button>
            </div>
            <!-- 범위 번역 다이얼로그 -->
            <div class="range-dialog-overlay" id="range-dialog-overlay">
                <div class="range-dialog" id="range-dialog">
                    <h3>범위 번역</h3>
                    <div class="range-inputs">
                        <label>시작:</label>
                        <input type="number" id="range-start" min="1" value="1">
                        <label>끝:</label>
                        <input type="number" id="range-end" min="1" value="1">
                    </div>
                    <div class="range-hint">최대 5페이지까지 한 번에 번역</div>
                    <div class="range-error" id="range-error"></div>
                    <div class="range-actions">
                        <button class="btn-range-cancel" id="range-cancel-btn">취소</button>
                        <button class="btn-range-submit" id="range-submit-btn">번역</button>
                    </div>
                </div>
            </div>
            <div class="viewer-panels" id="viewer-panels">
                <!-- Left: Original -->
                <div class="viewer-panel" id="panel-left">
                    <span class="panel-label">원문</span>
                    <div class="pdf-page-container" id="left-page-container">
                        <canvas id="left-canvas"></canvas>
                        <div class="text-layer" id="left-text-layer"></div>
                        <div class="annotation-layer" id="left-annotation-layer"></div>
                    </div>
                </div>
                <!-- Right: Translation -->
                <div class="viewer-panel" id="panel-right">
                    <span class="panel-label">번역</span>
                    <!-- 마킹 플로팅 위젯 -->
                    <div class="marking-float" id="marking-float">
                        <div class="mf-trigger" id="mf-trigger">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h9l3-3"/><path d="M22 12l-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"/></svg>
                            <span class="mf-count" id="mf-count" style="display:none">0</span>
                        </div>
                        <div class="mf-dropdown" id="mf-dropdown">
                            <div class="mf-header">
                                <span class="mf-title">마킹</span>
                                <span class="mf-badge" id="mf-badge">0</span>
                            </div>
                            <div class="mf-body" id="mf-body"></div>
                        </div>
                    </div>
                    <div class="pdf-page-container" id="right-page-container" style="display:none">
                        <canvas id="right-canvas"></canvas>
                        <div class="text-layer" id="right-text-layer"></div>
                        <div class="annotation-layer" id="right-annotation-layer"></div>
                    </div>
                    <div class="right-panel-placeholder" id="right-placeholder">
                        <div class="placeholder-icon">&#128221;</div>
                        <div class="placeholder-text">이 페이지는 아직 번역되지 않았습니다</div>
                        <div class="placeholder-hint">아래 "이 페이지 번역" 버튼을 눌러 시작하세요 (~30초)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script src="js/config.js"></script>
    <script src="js/lib/pdfjs/pdf.min.js"></script>
    <script src="js/platform-header.js"></script>
    <script src="js/platform-footer.js"></script>
    <script>
    // ── 테마 초기화 ──
    (function() {
        var saved = localStorage.getItem('theme');
        document.body.dataset.theme = (saved === 'dark') ? 'dark' : 'light';
    })();
    </script>
    <script src="js/translator.js"></script>
</body>
</html>
