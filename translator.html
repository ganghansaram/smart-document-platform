<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator — Smart Document Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/platform-header.css">
    <link rel="stylesheet" href="css/tree-menu.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
            color: #2c3e50;
            visibility: hidden;
            overflow: hidden;
        }

        /* ── 페이지 네비게이션 (뷰어 전용, midSlot) ── */
        .translator-page-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .translator-page-nav .pn-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            padding: 0;
        }

        .translator-page-nav .pn-btn:hover { background: rgba(255,255,255,0.2); }
        .translator-page-nav .pn-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .translator-page-nav .pn-btn svg { width: 14px; height: 14px; }

        .translator-page-info {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            min-width: 60px;
            text-align: center;
            white-space: nowrap;
        }

        /* ── Main area ── */
        .translator-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ══ State: Document List ══ */
        .view-list {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 32px;
        }

        .view-viewer { display: none; height: 100%; flex-direction: column; }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed #dde4e8;
            border-radius: 10px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 28px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #0066cc;
            background: rgba(0,102,204,0.05);
        }

        .upload-zone-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
        .upload-zone-text { font-size: 15px; color: #7f8c8d; }
        .upload-zone-hint { font-size: 13px; color: #95a5a6; margin-top: 6px; }
        .upload-zone input[type="file"] { display: none; }

        /* 문서 카드 그리드 */
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .doc-grid.drag-over {
            outline: 2px dashed #4a90d9;
            outline-offset: -2px;
            border-radius: 8px;
            background: rgba(74,144,217,0.04);
        }

        .doc-card {
            background: #ffffff;
            border: 1px solid #dde4e8;
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            cursor: pointer;
        }

        .doc-card:hover { border-color: rgba(0,102,204,0.4); }

        .doc-card-title {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 24px;
            position: relative;
        }

        .doc-card-title .title-edit-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            border: none;
            background: none;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .doc-card-title .title-edit-btn svg {
            width: 13px;
            height: 13px;
            fill: #95a5a6;
        }

        .doc-card:hover .title-edit-btn { opacity: 1; }
        .doc-card-title .title-edit-btn:hover svg { fill: #0066cc; }

        .doc-card-title .title-edit-input {
            width: 100%;
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            border: 1px solid #0066cc;
            border-radius: 4px;
            padding: 2px 4px;
            outline: none;
            background: #fff;
        }

        .doc-card-meta {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .doc-card-status {
            font-size: 13px;
            margin-bottom: 12px;
        }

        .doc-card-status.status-done { color: #3fb950; }
        .doc-card-status.status-partial { color: #58a6ff; }

        .doc-card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .card-btn {
            padding: 5px 12px;
            border: 1px solid #dde4e8;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: #fff;
            color: #555;
            transition: background 0.15s, border-color 0.15s;
        }

        .card-btn:hover { background: #e8f4f8; border-color: #0066cc; color: #0066cc; }

        .card-btn.primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        .card-btn.primary:hover { background: #2ea043; }

        .card-btn.danger { color: #f85149; }
        .card-btn.danger:hover { background: rgba(248,81,73,0.1); border-color: #f85149; }

        .card-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .doc-empty {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
            font-size: 14px;
        }

        /* ══ State: Viewer (Dual Panel) ══ */

        .viewer-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-bottom: 1px solid #dde4e8;
            background: #fff;
            flex-shrink: 0;
        }

        .viewer-toolbar .spacer { flex: 1; }

        .viewer-toolbar select {
            padding: 4px 8px;
            border: 1px solid #dde4e8;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
            color: #2c3e50;
            max-width: 160px;
        }

        .viewer-toolbar .translate-page-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: #238636;
            color: #fff;
            transition: background 0.15s;
        }
        .viewer-toolbar .translate-page-btn:hover { background: #2ea043; }
        .viewer-toolbar .translate-page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .viewer-toolbar .cancel-page-btn {
            padding: 5px 14px;
            border: 1px solid #f85149;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #f85149;
            transition: background 0.15s;
        }
        .viewer-toolbar .cancel-page-btn:hover { background: rgba(248,81,73,0.1); }

        .viewer-toolbar .range-translate-btn {
            padding: 5px 14px;
            border: 1px solid #238636;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #238636;
            transition: background 0.15s, color 0.15s;
        }
        .viewer-toolbar .range-translate-btn:hover { background: #238636; color: #fff; }

        /* 범위 번역 다이얼로그 */
        .range-dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }
        .range-dialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border-radius: 10px;
            padding: 24px 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            min-width: 280px;
            z-index: 1000;
        }
        .range-dialog h3 {
            margin: 0 0 16px;
            font-size: 16px;
            font-weight: 600;
        }
        .range-dialog .range-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .range-dialog .range-inputs label {
            font-size: 13px;
            color: #555;
        }
        .range-dialog .range-inputs input {
            width: 60px;
            padding: 5px 8px;
            border: 1px solid #dde4e8;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
            font-family: inherit;
        }
        .range-dialog .range-hint {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 16px;
        }
        .range-dialog .range-error {
            font-size: 12px;
            color: #f85149;
            margin-bottom: 8px;
            min-height: 16px;
        }
        .range-dialog .range-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .range-dialog .range-actions button {
            padding: 6px 18px;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            border: none;
        }
        .range-dialog .btn-range-cancel {
            background: #f0f0f0;
            color: #555;
        }
        .range-dialog .btn-range-cancel:hover { background: #e0e0e0; }
        .range-dialog .btn-range-submit {
            background: #238636;
            color: #fff;
        }
        .range-dialog .btn-range-submit:hover { background: #2ea043; }

        [data-theme="dark"] .range-dialog { background: #1e1e1e; color: #e0e0e0; }
        [data-theme="dark"] .range-dialog .range-inputs input { background: #2d2d2d; border-color: #444; color: #e0e0e0; }
        [data-theme="dark"] .range-dialog .btn-range-cancel { background: #333; color: #ccc; }

        .viewer-toolbar .page-status-text {
            font-size: 13px;
            color: #7f8c8d;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #dde4e8;
            border-radius: 4px;
            background: #fff;
            color: #555;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, border-color 0.15s;
        }

        .zoom-btn:hover { background: #e8f4f8; border-color: #0066cc; color: #0066cc; }

        .scroll-sync-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border: 1px solid #dde4e8;
            border-radius: 4px;
            background: #fff;
            color: #7f8c8d;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .scroll-sync-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
        .scroll-sync-btn:hover { border-color: #0066cc; color: #0066cc; }
        .scroll-sync-btn.active {
            background: #e8f4f8;
            border-color: #0066cc;
            color: #0066cc;
        }

        .zoom-level {
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            min-width: 40px;
            text-align: center;
            color: #7f8c8d;
        }

        /* Dual panel */
        .viewer-panels {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .viewer-panel {
            flex: 1;
            overflow: auto;
            padding: 16px;
            text-align: center;  /* 작을 때 중앙 정렬, 클 때 자연 스크롤 */
            background: #f0f0f0;
            position: relative;
        }

        .viewer-panel + .viewer-panel {
            border-left: 2px solid #dde4e8;
        }

        .viewer-panel .panel-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 11px;
            color: #95a5a6;
            background: rgba(255,255,255,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            z-index: 1;
            pointer-events: none;
        }

        .viewer-panel .pdf-page-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .viewer-panel canvas {
            display: block;
        }

        .text-layer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            opacity: 0.25;
            line-height: 1.0;
        }

        .text-layer > span {
            color: transparent;
            position: absolute;
            white-space: pre;
            transform-origin: 0% 0%;
        }

        .text-layer ::selection {
            background: rgba(0, 100, 200, 0.3);
        }

        /* 우측 패널 상태별 표시 */
        .right-panel-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #7f8c8d;
            gap: 12px;
        }

        .right-panel-placeholder .placeholder-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .right-panel-placeholder .placeholder-text {
            font-size: 14px;
        }

        .right-panel-placeholder .placeholder-hint {
            font-size: 12px;
            color: #95a5a6;
        }

        .right-panel-placeholder .placeholder-error {
            font-size: 13px;
            color: #f85149;
            max-width: 300px;
            word-break: break-word;
        }

        /* Spinner */
        .page-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #dde4e8;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .translator-footer {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: #95a5a6;
            flex-shrink: 0;
            border-top: 1px solid #dde4e8;
        }

        /* ── Transitions ── */
        body.fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ══════════════════════════════════════
           다크 모드
           ══════════════════════════════════════ */
        body[data-theme="dark"] { background: #121218; color: #e0e0e0; }

        body[data-theme="dark"] .upload-zone { border-color: rgba(255,255,255,0.15); }
        body[data-theme="dark"] .upload-zone:hover,
        body[data-theme="dark"] .upload-zone.dragover { border-color: #58a6ff; background: rgba(88,166,255,0.05); }
        body[data-theme="dark"] .upload-zone-text { color: rgba(255,255,255,0.5); }
        body[data-theme="dark"] .upload-zone-hint { color: rgba(255,255,255,0.3); }

        body[data-theme="dark"] .doc-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .doc-card:hover { border-color: rgba(88,166,255,0.4); }
        body[data-theme="dark"] .doc-card-title { color: #e6edf3; }
        body[data-theme="dark"] .doc-card-title .title-edit-btn svg { fill: #8b949e; }
        body[data-theme="dark"] .doc-card-title .title-edit-btn:hover svg { fill: #58a6ff; }
        body[data-theme="dark"] .doc-card-title .title-edit-input { background: #21262d; color: #e6edf3; border-color: #58a6ff; }
        body[data-theme="dark"] .doc-card-meta { color: rgba(255,255,255,0.4); }
        body[data-theme="dark"] .doc-empty { color: rgba(255,255,255,0.3); }

        body[data-theme="dark"] .card-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: #e0e0e0; }
        body[data-theme="dark"] .card-btn:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .card-btn.primary { background: #238636; border-color: #238636; color: #fff; }

        body[data-theme="dark"] .viewer-toolbar { background: #1e1e2e; border-bottom-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .viewer-toolbar select { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: #e0e0e0; }
        body[data-theme="dark"] .viewer-toolbar .page-status-text { color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .zoom-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); }
        body[data-theme="dark"] .zoom-btn:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .scroll-sync-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.4); }
        body[data-theme="dark"] .scroll-sync-btn:hover { border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .scroll-sync-btn.active { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .zoom-level { color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .viewer-panel { background: #0d0d12; }
        body[data-theme="dark"] .viewer-panel + .viewer-panel { border-left-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .viewer-panel .panel-label { background: rgba(30,30,46,0.8); color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .right-panel-placeholder { color: rgba(255,255,255,0.4); }
        body[data-theme="dark"] .right-panel-placeholder .placeholder-hint { color: rgba(255,255,255,0.25); }
        body[data-theme="dark"] .page-spinner { border-color: rgba(255,255,255,0.1); border-top-color: #58a6ff; }

        body[data-theme="dark"] .translator-footer { color: rgba(255,255,255,0.2); border-top-color: rgba(255,255,255,0.05); }

        /* ══════════════════════════════════════
           트리 패널 (오버레이)
           ══════════════════════════════════════ */

        .tree-panel-trigger {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 56px;
            z-index: 99;
            cursor: pointer;
            background: #f5f7fa;
            border: 1px solid #dde4e8;
            border-left: none;
            border-radius: 0 6px 6px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            opacity: 0.5;
            transition: all 0.25s ease;
        }

        .tree-panel-trigger::after {
            content: '\203A';
            font-size: 20px;
            font-weight: 300;
            color: #7f8c8d;
            line-height: 1;
        }

        .tree-panel-trigger:hover {
            background: #fff;
            border-color: #0066cc;
            box-shadow: 0 2px 12px rgba(0,102,204,0.15);
            opacity: 1;
        }

        .tree-panel-trigger:hover::after {
            color: #0066cc;
        }

        /* 패널 열렸을 때 손잡이 숨김 */
        .tree-panel-overlay.open ~ .tree-panel-trigger {
            opacity: 0;
            pointer-events: none;
        }

        .tree-panel-overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 340px;
            height: 100%;
            background: #fff;
            border-right: 1px solid #dde4e8;
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
        }

        .tree-panel-overlay.open {
            transform: translateX(0);
        }

        .tp-header {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #dde4e8;
            flex-shrink: 0;
            gap: 6px;
        }

        .tp-header-title {
            font-size: 14px;
            font-weight: 600;
            flex: 1;
            color: #2c3e50;
        }

        .tp-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #dde4e8;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, border-color 0.15s;
            color: #7f8c8d;
        }

        .tp-btn:hover { background: #e8f4f8; border-color: #0066cc; color: #0066cc; }
        .tp-btn svg { width: 14px; height: 14px; }

        .tp-btn.pinned {
            background: #e8f4f8;
            border-color: #0066cc;
            color: #0066cc;
        }

        /* 트리 내 tree-menu 스타일 조정 */
        .tree-panel-overlay .tree-menu {
            padding: 8px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        /* 트리 폴더 drag-over 하이라이트 */
        .tree-item.drag-over {
            background: rgba(0,102,204,0.12) !important;
            outline: 2px dashed #0066cc;
            outline-offset: -2px;
        }

        /* 카드 드래그 중 반투명 */
        .doc-card.dragging {
            opacity: 0.4;
        }

        .fp-submit:hover { background: #2ea043; }

        /* ── 다크 모드: 트리 패널 ── */
        body[data-theme="dark"] .tree-panel-trigger { background: #1e1e2e; border-color: rgba(255,255,255,0.08); box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

    <script>
    // ── 테마 초기화 ──
