<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator — Smart Document Platform</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/platform-header.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
            color: #2c3e50;
            visibility: hidden;
            overflow: hidden;
        }

        /* ── 페이지 네비게이션 (뷰어 전용, midSlot) ── */
        .translator-page-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .translator-page-nav .pn-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            padding: 0;
        }

        .translator-page-nav .pn-btn:hover { background: rgba(255,255,255,0.2); }
        .translator-page-nav .pn-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .translator-page-nav .pn-btn svg { width: 14px; height: 14px; }

        .translator-page-info {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            min-width: 60px;
            text-align: center;
            white-space: nowrap;
        }

        /* ── Main area ── */
        .translator-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ══ State: Document List ══ */
        .view-list {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 32px;
        }

        .view-viewer { display: none; height: 100%; flex-direction: column; }

        /* Upload zone */
        .upload-zone {
            border: 2px dashed #dde4e8;
            border-radius: 10px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 28px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #0066cc;
            background: rgba(0,102,204,0.05);
        }

        .upload-zone-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }
        .upload-zone-text { font-size: 15px; color: #7f8c8d; }
        .upload-zone-hint { font-size: 13px; color: #95a5a6; margin-top: 6px; }
        .upload-zone input[type="file"] { display: none; }

        /* 문서 카드 그리드 */
        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .doc-card {
            background: #ffffff;
            border: 1px solid #dde4e8;
            border-radius: 10px;
            padding: 20px;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
            cursor: pointer;
        }

        .doc-card:hover { border-color: rgba(0,102,204,0.4); }

        .doc-card-title {
            font-size: 15px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 24px;
        }

        .doc-card-meta {
            font-size: 13px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .doc-card-status {
            font-size: 13px;
            margin-bottom: 12px;
        }

        .doc-card-status.status-done { color: #3fb950; }
        .doc-card-status.status-partial { color: #58a6ff; }

        .doc-card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .card-btn {
            padding: 5px 12px;
            border: 1px solid #dde4e8;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: #fff;
            color: #555;
            transition: background 0.15s, border-color 0.15s;
        }

        .card-btn:hover { background: #e8f4f8; border-color: #0066cc; color: #0066cc; }

        .card-btn.primary {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }
        .card-btn.primary:hover { background: #2ea043; }

        .card-btn.danger { color: #f85149; }
        .card-btn.danger:hover { background: rgba(248,81,73,0.1); border-color: #f85149; }

        .card-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .doc-empty {
            text-align: center;
            padding: 40px;
            color: #95a5a6;
            font-size: 14px;
        }

        /* ══ State: Viewer (Dual Panel) ══ */

        .viewer-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-bottom: 1px solid #dde4e8;
            background: #fff;
            flex-shrink: 0;
        }

        .viewer-toolbar .spacer { flex: 1; }

        .viewer-toolbar select {
            padding: 4px 8px;
            border: 1px solid #dde4e8;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
            color: #2c3e50;
            max-width: 160px;
        }

        .viewer-toolbar .translate-page-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: #238636;
            color: #fff;
            transition: background 0.15s;
        }
        .viewer-toolbar .translate-page-btn:hover { background: #2ea043; }
        .viewer-toolbar .translate-page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .viewer-toolbar .cancel-page-btn {
            padding: 5px 14px;
            border: 1px solid #f85149;
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: transparent;
            color: #f85149;
            transition: background 0.15s;
        }
        .viewer-toolbar .cancel-page-btn:hover { background: rgba(248,81,73,0.1); }

        .viewer-toolbar .page-status-text {
            font-size: 13px;
            color: #7f8c8d;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .zoom-btn {
            width: 26px;
            height: 26px;
            border: 1px solid #dde4e8;
            border-radius: 4px;
            background: #fff;
            color: #555;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.15s, border-color 0.15s;
        }

        .zoom-btn:hover { background: #e8f4f8; border-color: #0066cc; color: #0066cc; }

        .zoom-level {
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            min-width: 40px;
            text-align: center;
            color: #7f8c8d;
        }

        /* Dual panel */
        .viewer-panels {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .viewer-panel {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 16px;
            background: #f0f0f0;
            position: relative;
        }

        .viewer-panel + .viewer-panel {
            border-left: 2px solid #dde4e8;
        }

        .viewer-panel .panel-label {
            position: absolute;
            top: 8px;
            left: 12px;
            font-size: 11px;
            color: #95a5a6;
            background: rgba(255,255,255,0.8);
            padding: 2px 8px;
            border-radius: 4px;
            z-index: 1;
            pointer-events: none;
        }

        .viewer-panel .pdf-page-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .viewer-panel canvas {
            display: block;
        }

        .text-layer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            opacity: 0.25;
            line-height: 1.0;
        }

        .text-layer > span {
            color: transparent;
            position: absolute;
            white-space: pre;
            transform-origin: 0% 0%;
        }

        .text-layer ::selection {
            background: rgba(0, 100, 200, 0.3);
        }

        /* 우측 패널 상태별 표시 */
        .right-panel-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            text-align: center;
            color: #7f8c8d;
            gap: 12px;
        }

        .right-panel-placeholder .placeholder-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        .right-panel-placeholder .placeholder-text {
            font-size: 14px;
        }

        .right-panel-placeholder .placeholder-hint {
            font-size: 12px;
            color: #95a5a6;
        }

        .right-panel-placeholder .placeholder-error {
            font-size: 13px;
            color: #f85149;
            max-width: 300px;
            word-break: break-word;
        }

        /* Spinner */
        .page-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #dde4e8;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .translator-footer {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: #95a5a6;
            flex-shrink: 0;
            border-top: 1px solid #dde4e8;
        }

        /* ── Transitions ── */
        body.fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ══════════════════════════════════════
           다크 모드
           ══════════════════════════════════════ */
        body[data-theme="dark"] { background: #121218; color: #e0e0e0; }

        body[data-theme="dark"] .upload-zone { border-color: rgba(255,255,255,0.15); }
        body[data-theme="dark"] .upload-zone:hover,
        body[data-theme="dark"] .upload-zone.dragover { border-color: #58a6ff; background: rgba(88,166,255,0.05); }
        body[data-theme="dark"] .upload-zone-text { color: rgba(255,255,255,0.5); }
        body[data-theme="dark"] .upload-zone-hint { color: rgba(255,255,255,0.3); }

        body[data-theme="dark"] .doc-card { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .doc-card:hover { border-color: rgba(88,166,255,0.4); }
        body[data-theme="dark"] .doc-card-title { color: #e6edf3; }
        body[data-theme="dark"] .doc-card-meta { color: rgba(255,255,255,0.4); }
        body[data-theme="dark"] .doc-empty { color: rgba(255,255,255,0.3); }

        body[data-theme="dark"] .card-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: #e0e0e0; }
        body[data-theme="dark"] .card-btn:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .card-btn.primary { background: #238636; border-color: #238636; color: #fff; }

        body[data-theme="dark"] .viewer-toolbar { background: #1e1e2e; border-bottom-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .viewer-toolbar select { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: #e0e0e0; }
        body[data-theme="dark"] .viewer-toolbar .page-status-text { color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .zoom-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); }
        body[data-theme="dark"] .zoom-btn:hover { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.4); color: #58a6ff; }
        body[data-theme="dark"] .zoom-level { color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .viewer-panel { background: #0d0d12; }
        body[data-theme="dark"] .viewer-panel + .viewer-panel { border-left-color: rgba(255,255,255,0.08); }
        body[data-theme="dark"] .viewer-panel .panel-label { background: rgba(30,30,46,0.8); color: rgba(255,255,255,0.4); }

        body[data-theme="dark"] .right-panel-placeholder { color: rgba(255,255,255,0.4); }
        body[data-theme="dark"] .right-panel-placeholder .placeholder-hint { color: rgba(255,255,255,0.25); }
        body[data-theme="dark"] .page-spinner { border-color: rgba(255,255,255,0.1); border-top-color: #58a6ff; }

        body[data-theme="dark"] .translator-footer { color: rgba(255,255,255,0.2); border-top-color: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <!-- page-nav: 뷰어 전용, platform-header midSlot에 삽입 -->
    <div class="translator-page-nav" id="page-nav" style="display:none">
        <button class="pn-btn" id="page-prev" title="이전 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="translator-page-info" id="page-info">1 / 1</span>
        <button class="pn-btn" id="page-next" title="다음 페이지">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
    </div>

    <div class="translator-body">
        <!-- State 1: Document List + Upload -->
        <div class="view-list" id="view-list">
            <div class="upload-zone" id="upload-zone">
                <div class="upload-zone-icon">&#128196;</div>
                <div class="upload-zone-text">PDF 파일을 드래그하거나 클릭하여 업로드</div>
                <div class="upload-zone-hint">최대 100MB</div>
                <input type="file" id="file-input" accept=".pdf">
            </div>
            <div class="doc-grid" id="doc-grid"></div>
        </div>

        <!-- State 2: Dual Panel Viewer -->
        <div class="view-viewer" id="view-viewer">
            <div class="viewer-toolbar" id="viewer-toolbar">
                <span class="zoom-controls">
                    <button class="zoom-btn" id="zoom-out" title="축소">&minus;</button>
                    <span class="zoom-level" id="zoom-level" title="클릭하면 100%로 초기화" style="cursor:pointer;">100%</span>
                    <button class="zoom-btn" id="zoom-in" title="확대">+</button>
                </span>
                <span class="spacer"></span>
                <span class="page-status-text" id="toolbar-page-status"></span>
                <select id="model-select"></select>
                <button class="translate-page-btn" id="translate-page-btn">이 페이지 번역</button>
                <button class="cancel-page-btn" id="cancel-page-btn" style="display:none">취소</button>
            </div>
            <div class="viewer-panels" id="viewer-panels">
                <!-- Left: Original -->
                <div class="viewer-panel" id="panel-left">
                    <span class="panel-label">원문</span>
                    <div class="pdf-page-container" id="left-page-container">
                        <canvas id="left-canvas"></canvas>
                        <div class="text-layer" id="left-text-layer"></div>
                    </div>
                </div>
                <!-- Right: Translation -->
                <div class="viewer-panel" id="panel-right">
                    <span class="panel-label">번역</span>
                    <div class="pdf-page-container" id="right-page-container" style="display:none">
                        <canvas id="right-canvas"></canvas>
                    </div>
                    <div class="right-panel-placeholder" id="right-placeholder">
                        <div class="placeholder-icon">&#128221;</div>
                        <div class="placeholder-text">이 페이지는 아직 번역되지 않았습니다</div>
                        <div class="placeholder-hint">아래 "이 페이지 번역" 버튼을 눌러 시작하세요 (~30초)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="translator-footer">
        &copy; 2025 Korea Aerospace Industries, Ltd. &middot; Smart Document Platform
    </footer>

    <script src="js/config.js"></script>
    <script src="js/lib/pdfjs/pdf.min.js"></script>
    <script src="js/platform-header.js"></script>
    <script>
    // ── 테마 초기화 ──
    (function() {
        var saved = localStorage.getItem('theme');
        if (saved === 'dark') document.body.dataset.theme = 'dark';
    })();
    </script>
    <script>
    (function() {
        'use strict';

        // ── PDF.js 설정 ──
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'js/lib/pdfjs/pdf.worker.min.js';

        var API = (typeof AUTH_CONFIG !== 'undefined' && AUTH_CONFIG.backendUrl)
            ? AUTH_CONFIG.backendUrl : 'http://localhost:8000';

        // ── Platform Header ──
        var $pageNavSource = document.getElementById('page-nav');
        $pageNavSource.style.display = '';

        var header = initPlatformHeader({
            title: 'Translator',
            navItems: [
                { id: 'back-launcher', label: 'Platform', href: 'launcher.html' },
                { id: 'back-list', label: '목록', hidden: true },
            ],
            midSlot: $pageNavSource,
            showThemeToggle: true,
            onAuth: function(user) {
                currentUser = user;
                document.body.style.visibility = 'visible';
                document.body.classList.add('fade-in');
                loadDocuments();
                loadModels();
            }
        });

        // ── 테마 토글 ──
        var $themeToggle = document.getElementById('theme-toggle');
        if ($themeToggle) {
            $themeToggle.addEventListener('click', function() {
                var isDark = document.body.dataset.theme === 'dark';
                document.body.dataset.theme = isDark ? '' : 'dark';
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
            });
        }

        var $backList = header.nav['back-list'];
        $backList.addEventListener('click', function() { showList(); });

        // ══════════════════════════════════════
        // State
        // ══════════════════════════════════════
        var currentUser = null;
        var currentDocId = null;
        var currentPage = 1;
        var totalPages = 1;
        var modelsList = [];
        var defaultModel = '';
        var pageStatusCache = {};  // page_num → { status, ... }
        var hasLegacyTranslation = false;
        var pollingTimer = null;

        // PDF.js state — left (original)
        var leftPdfDoc = null;
        var leftRenderTask = null;

        // PDF.js state — right (translation)
        var rightPdfDoc = null;
        var rightRenderTask = null;

        // Zoom
        var zoom = 1.0;
        var ZOOM_STEP = 0.1;
        var ZOOM_MIN = 0.5;
        var ZOOM_MAX = 3.0;

        // ── DOM refs ──
        var $viewList       = document.getElementById('view-list');
        var $viewViewer     = document.getElementById('view-viewer');
        var $docGrid        = document.getElementById('doc-grid');
        var $uploadZone     = document.getElementById('upload-zone');
        var $fileInput      = document.getElementById('file-input');
        var $pageInfo       = document.getElementById('page-info');
        var $pagePrev       = document.getElementById('page-prev');
        var $pageNext       = document.getElementById('page-next');
        var $zoomLevel      = document.getElementById('zoom-level');
        var $zoomIn         = document.getElementById('zoom-in');
        var $zoomOut        = document.getElementById('zoom-out');

        // Left panel
        var $panelLeft      = document.getElementById('panel-left');
        var $leftCanvas     = document.getElementById('left-canvas');
        var $leftContainer  = document.getElementById('left-page-container');
        var $leftTextLayer  = document.getElementById('left-text-layer');

        // Right panel
        var $panelRight     = document.getElementById('panel-right');
        var $rightCanvas    = document.getElementById('right-canvas');
        var $rightContainer = document.getElementById('right-page-container');
        var $rightPlaceholder = document.getElementById('right-placeholder');

        // Toolbar
        var $toolbarStatus  = document.getElementById('toolbar-page-status');
        var $modelSelect    = document.getElementById('model-select');
        var $translateBtn   = document.getElementById('translate-page-btn');
        var $cancelBtn      = document.getElementById('cancel-page-btn');

        // ══════════════════════════════════════
        // Upload
        // ══════════════════════════════════════

        $uploadZone.addEventListener('click', function() { $fileInput.click(); });
        $fileInput.addEventListener('change', function() {
            if ($fileInput.files.length) uploadFile($fileInput.files[0]);
        });
        $uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            $uploadZone.classList.add('dragover');
        });
        $uploadZone.addEventListener('dragleave', function() {
            $uploadZone.classList.remove('dragover');
        });
        $uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            $uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
        });

        function uploadFile(file) {
            if (!file.name.toLowerCase().endsWith('.pdf')) {
                alert('PDF 파일만 업로드할 수 있습니다.');
                return;
            }
            var formData = new FormData();
            formData.append('file', file);

            $uploadZone.style.pointerEvents = 'none';
            $uploadZone.querySelector('.upload-zone-text').textContent = '업로드 중...';

            fetch(API + '/api/translator/upload', {
                method: 'POST',
                body: formData,
                credentials: 'include',
            }).then(function(resp) {
                if (!resp.ok) return resp.json().then(function(e) { throw new Error(e.detail || 'Upload failed'); });
                return resp.json();
            }).then(function() {
                $fileInput.value = '';
                loadDocuments();
            }).catch(function(err) {
                alert('업로드 오류: ' + err.message);
            }).finally(function() {
                $uploadZone.style.pointerEvents = '';
                $uploadZone.querySelector('.upload-zone-text').textContent = 'PDF 파일을 드래그하거나 클릭하여 업로드';
            });
        }

        // ══════════════════════════════════════
        // 모델 목록
        // ══════════════════════════════════════

        function loadModels() {
            fetch(API + '/api/translator/models', { credentials: 'include' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var models = (data.models || []).filter(function(m) {
                        var name = m.name || '';
                        return name.indexOf('embed') === -1 && name.indexOf('bge') === -1
                            && name.indexOf('rerank') === -1;
                    });
                    modelsList = models.map(function(m) { return m.name; });

                    fetch(API + '/api/settings/public', { credentials: 'include' })
                        .then(function(r) { return r.json(); })
                        .catch(function() { return {}; })
                        .then(function(pub) {
                            defaultModel = '';
                            populateModelSelect();
                        });
                })
                .catch(function() {
                    modelsList = [];
                });
        }

        function populateModelSelect() {
            $modelSelect.innerHTML = '';
            modelsList.forEach(function(name) {
                var opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === (defaultModel || modelsList[0])) opt.selected = true;
                $modelSelect.appendChild(opt);
            });
            if (modelsList.length === 0) {
                var opt = document.createElement('option');
                opt.value = '';
                opt.textContent = '모델 없음';
                $modelSelect.appendChild(opt);
            }
        }

        // ══════════════════════════════════════
        // Document List
        // ══════════════════════════════════════

        function loadDocuments() {
            fetch(API + '/api/translator/documents', { credentials: 'include' })
                .then(function(r) { return r.json(); })
                .then(function(docs) { renderDocGrid(docs); })
                .catch(function() { $docGrid.innerHTML = '<div class="doc-empty">문서를 불러올 수 없습니다</div>'; });
        }

        function renderDocGrid(docs) {
            if (!docs.length) {
                $docGrid.innerHTML = '<div class="doc-empty">업로드된 문서가 없습니다</div>';
                return;
            }

            $docGrid.innerHTML = '';
            docs.forEach(function(doc) {
                var card = createDocCard(doc);
                $docGrid.appendChild(card);
            });
        }

        function createDocCard(doc) {
            var card = document.createElement('div');
            card.className = 'doc-card';
            card.setAttribute('data-doc-id', doc.id);

            var title = document.createElement('div');
            title.className = 'doc-card-title';
            title.textContent = doc.filename;
            card.appendChild(title);

            var meta = document.createElement('div');
            meta.className = 'doc-card-meta';
            meta.textContent = (doc.total_pages || doc.pages || 0) + '페이지';
            if (doc.uploaded_at) {
                meta.textContent += ' · ' + formatDate(doc.uploaded_at);
            }
            card.appendChild(meta);

            // 상태 표시
            var statusEl = document.createElement('div');
            statusEl.className = 'doc-card-status';
            var translated = doc.translated_pages || 0;
            var total = doc.total_pages || doc.pages || 0;
            if (doc.has_legacy_translation) {
                statusEl.classList.add('status-done');
                statusEl.textContent = '번역완료 (전체)';
            } else if (translated > 0) {
                statusEl.classList.add('status-partial');
                statusEl.textContent = translated + '/' + total + ' 페이지 번역됨';
            } else {
                statusEl.textContent = '준비됨';
            }
            card.appendChild(statusEl);

            // 액션
            var actions = document.createElement('div');
            actions.className = 'doc-card-actions';

            var openBtn = document.createElement('button');
            openBtn.className = 'card-btn primary';
            openBtn.textContent = '열기';
            openBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                openViewer(doc.id, doc.total_pages || doc.pages || 1);
            });
            actions.appendChild(openBtn);

            var deleteBtn = document.createElement('button');
            deleteBtn.className = 'card-btn danger';
            deleteBtn.textContent = '삭제';
            deleteBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!confirm(doc.filename + ' 문서를 삭제하시겠습니까?')) return;
                fetch(API + '/api/translator/document/' + doc.id, {
                    method: 'DELETE',
                    credentials: 'include',
                }).then(function() { loadDocuments(); });
            });
            actions.appendChild(deleteBtn);

            card.appendChild(actions);

            // 카드 클릭 → 뷰어
            card.addEventListener('click', function(e) {
                if (e.target.tagName === 'BUTTON') return;
                openViewer(doc.id, doc.total_pages || doc.pages || 1);
            });

            return card;
        }

        // ══════════════════════════════════════
        // Viewer
        // ══════════════════════════════════════

        function openViewer(docId, pages) {
            currentDocId = docId;
            totalPages = pages || 1;
            currentPage = 1;
            pageStatusCache = {};
            hasLegacyTranslation = false;
            zoom = 1.0;
            $zoomLevel.textContent = '100%';

            showViewer();

            // 페이지 상태 요약 로드 후 렌더링
            fetchPageSummary(function() {
                loadLeftPdf();
                updateRightPanel();
            });
        }

        function showViewer() {
            $viewList.style.display = 'none';
            $viewViewer.style.display = 'flex';
            header.midSlot.classList.add('visible');
            header.nav['back-list'].style.display = '';
            updatePageNav();
        }

        function showList() {
            $viewViewer.style.display = 'none';
            $viewList.style.display = 'flex';
            header.midSlot.classList.remove('visible');
            header.nav['back-list'].style.display = 'none';
            currentDocId = null;
            stopPolling();
            destroyPdfs();
            loadDocuments();
        }

        function destroyPdfs() {
            if (leftPdfDoc) { leftPdfDoc.destroy(); leftPdfDoc = null; }
            if (rightPdfDoc) { rightPdfDoc.destroy(); rightPdfDoc = null; }
            if (leftRenderTask) { leftRenderTask.cancel(); leftRenderTask = null; }
            if (rightRenderTask) { rightRenderTask.cancel(); rightRenderTask = null; }
        }

        function fetchPageSummary(cb) {
            fetch(API + '/api/translator/document/' + currentDocId + '/pages', { credentials: 'include' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    totalPages = data.pages || totalPages;
                    hasLegacyTranslation = data.has_legacy_translation || false;
                    pageStatusCache = data.page_status || {};
                    updatePageNav();
                    if (cb) cb();
                })
                .catch(function() { if (cb) cb(); });
        }

        // ── Left Panel: Original PDF ──

        function loadLeftPdf() {
            if (leftPdfDoc) { leftPdfDoc.destroy(); leftPdfDoc = null; }
            var url = API + '/api/translator/pdf/' + currentDocId;
            pdfjsLib.getDocument({ url: url, withCredentials: true }).promise.then(function(pdf) {
                leftPdfDoc = pdf;
                totalPages = pdf.numPages;
                updatePageNav();
                renderLeftPage(currentPage);
            }).catch(function(err) {
                console.error('[PDF.js] left load error:', err);
            });
        }

        function renderLeftPage(pageNum) {
            if (!leftPdfDoc) return;
            if (leftRenderTask) { leftRenderTask.cancel(); leftRenderTask = null; }

            leftPdfDoc.getPage(pageNum).then(function(page) {
                var wrapWidth = $panelLeft.clientWidth - 32;
                var viewport = page.getViewport({ scale: 1 });
                var fitScale = wrapWidth / viewport.width;
                var baseScale = Math.min(fitScale, 1.5);
                var scale = baseScale * zoom;
                var scaledViewport = page.getViewport({ scale: scale });

                $leftCanvas.width = scaledViewport.width;
                $leftCanvas.height = scaledViewport.height;
                $leftCanvas.style.width = scaledViewport.width + 'px';
                $leftCanvas.style.height = scaledViewport.height + 'px';

                $leftContainer.style.width = scaledViewport.width + 'px';
                $leftContainer.style.height = scaledViewport.height + 'px';

                $leftTextLayer.innerHTML = '';
                $leftTextLayer.style.width = scaledViewport.width + 'px';
                $leftTextLayer.style.height = scaledViewport.height + 'px';

                var ctx = $leftCanvas.getContext('2d');
                leftRenderTask = page.render({ canvasContext: ctx, viewport: scaledViewport });
                leftRenderTask.promise.then(function() {
                    leftRenderTask = null;
                    return page.getTextContent();
                }).then(function(textContent) {
                    if (textContent) {
                        pdfjsLib.renderTextLayer({
                            textContent: textContent,
                            container: $leftTextLayer,
                            viewport: scaledViewport,
                            textDivs: [],
                        });
                    }
                }).catch(function() { leftRenderTask = null; });
            });
        }

        // ── Right Panel: Translation PDF or Placeholder ──

        function updateRightPanel() {
            var ps = pageStatusCache[String(currentPage)];
            var status = ps ? ps.status : 'pending';

            // 레거시 통번역이 있으면 그걸 표시
            if (hasLegacyTranslation && status === 'pending') {
                showRightLegacy();
                updateToolbarForStatus('legacy');
                return;
            }

            if (status === 'done') {
                showRightTranslatedPage();
                updateToolbarForStatus('done');
            } else if (status === 'translating') {
                showRightTranslating(ps);
                updateToolbarForStatus('translating');
                startPolling();
            } else if (status === 'error') {
                showRightError(ps);
                updateToolbarForStatus('error');
            } else {
                showRightPending();
                updateToolbarForStatus('pending');
            }
        }

        function showRightPending() {
            $rightContainer.style.display = 'none';
            $rightPlaceholder.style.display = 'flex';
            $rightPlaceholder.innerHTML =
                '<div class="placeholder-icon">&#128221;</div>' +
                '<div class="placeholder-text">이 페이지는 아직 번역되지 않았습니다</div>' +
                '<div class="placeholder-hint">아래 "이 페이지 번역" 버튼을 눌러 시작하세요 (~30초)</div>';
        }

        function showRightTranslating(ps) {
            $rightContainer.style.display = 'none';
            $rightPlaceholder.style.display = 'flex';
            var stage = (ps && ps.progress_stage) || '번역 준비 중...';
            $rightPlaceholder.innerHTML =
                '<div class="page-spinner"></div>' +
                '<div class="placeholder-text">' + escHtml(stage) + '</div>';
        }

        function showRightError(ps) {
            $rightContainer.style.display = 'none';
            $rightPlaceholder.style.display = 'flex';
            var errMsg = (ps && ps.error) || '알 수 없는 오류';
            $rightPlaceholder.innerHTML =
                '<div class="placeholder-icon">&#9888;&#65039;</div>' +
                '<div class="placeholder-error">' + escHtml(errMsg) + '</div>' +
                '<div class="placeholder-hint">"이 페이지 번역" 버튼으로 재시도하세요</div>';
        }

        function showRightTranslatedPage() {
            $rightPlaceholder.style.display = 'none';
            $rightContainer.style.display = 'inline-block';

            // 페이지별 번역 PDF 로드 (1페이지짜리)
            if (rightPdfDoc) { rightPdfDoc.destroy(); rightPdfDoc = null; }
            var url = API + '/api/translator/translated-pdf/' + currentDocId + '/page/' + currentPage;
            pdfjsLib.getDocument({ url: url, withCredentials: true }).promise.then(function(pdf) {
                rightPdfDoc = pdf;
                renderRightPage(1); // 1페이지짜리 PDF의 첫 페이지
            }).catch(function(err) {
                console.error('[PDF.js] right page load error:', err);
                showRightError({ error: 'PDF 로드 실패' });
            });
        }

        function showRightLegacy() {
            $rightPlaceholder.style.display = 'none';
            $rightContainer.style.display = 'inline-block';

            // 레거시 translated.pdf에서 해당 페이지 렌더링
            if (rightPdfDoc) { rightPdfDoc.destroy(); rightPdfDoc = null; }
            var url = API + '/api/translator/translated-pdf/' + currentDocId;
            pdfjsLib.getDocument({ url: url, withCredentials: true }).promise.then(function(pdf) {
                rightPdfDoc = pdf;
                renderRightPage(currentPage);
            }).catch(function(err) {
                console.error('[PDF.js] right legacy load error:', err);
                // 레거시 PDF 로드 실패 → pending 표시
                hasLegacyTranslation = false;
                showRightPending();
                updateToolbarForStatus('pending');
            });
        }

        function renderRightPage(pageNum) {
            if (!rightPdfDoc) return;
            if (rightRenderTask) { rightRenderTask.cancel(); rightRenderTask = null; }

            rightPdfDoc.getPage(pageNum).then(function(page) {
                var wrapWidth = $panelRight.clientWidth - 32;
                var viewport = page.getViewport({ scale: 1 });
                var fitScale = wrapWidth / viewport.width;
                var baseScale = Math.min(fitScale, 1.5);
                var scale = baseScale * zoom;
                var scaledViewport = page.getViewport({ scale: scale });

                $rightCanvas.width = scaledViewport.width;
                $rightCanvas.height = scaledViewport.height;
                $rightCanvas.style.width = scaledViewport.width + 'px';
                $rightCanvas.style.height = scaledViewport.height + 'px';

                $rightContainer.style.width = scaledViewport.width + 'px';
                $rightContainer.style.height = scaledViewport.height + 'px';

                var ctx = $rightCanvas.getContext('2d');
                rightRenderTask = page.render({ canvasContext: ctx, viewport: scaledViewport });
                rightRenderTask.promise.then(function() {
                    rightRenderTask = null;
                }).catch(function() { rightRenderTask = null; });
            });
        }

        // ── Toolbar status ──

        function updateToolbarForStatus(status) {
            if (status === 'pending' || status === 'error') {
                $translateBtn.style.display = '';
                $translateBtn.disabled = false;
                $translateBtn.textContent = status === 'error' ? '재시도' : '이 페이지 번역';
                $cancelBtn.style.display = 'none';
                $modelSelect.style.display = '';
                $toolbarStatus.textContent = '';
            } else if (status === 'translating') {
                $translateBtn.style.display = 'none';
                $cancelBtn.style.display = '';
                $modelSelect.style.display = 'none';
                $toolbarStatus.textContent = '번역 중...';
            } else if (status === 'done') {
                $translateBtn.style.display = '';
                $translateBtn.textContent = '재번역';
                $translateBtn.disabled = false;
                $cancelBtn.style.display = 'none';
                $modelSelect.style.display = '';
                var ps = pageStatusCache[String(currentPage)];
                var info = '';
                if (ps) {
                    if (ps.model) info += ps.model;
                    if (ps.elapsed_sec) info += ', ' + ps.elapsed_sec + '초';
                }
                $toolbarStatus.textContent = info;
            } else if (status === 'legacy') {
                $translateBtn.style.display = '';
                $translateBtn.textContent = '페이지 번역';
                $translateBtn.disabled = false;
                $cancelBtn.style.display = 'none';
                $modelSelect.style.display = '';
                $toolbarStatus.textContent = '통번역 (레거시)';
            }
        }

        // ── Translate page button ──

        $translateBtn.addEventListener('click', function() {
            if (!currentDocId) return;
            var model = $modelSelect.value;
            $translateBtn.disabled = true;

            fetch(API + '/api/translator/translate/' + currentDocId + '/page/' + currentPage, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model }),
                credentials: 'include',
            }).then(function(resp) {
                if (!resp.ok) return resp.json().then(function(e) { throw new Error(e.detail); });
                // 즉시 UI 갱신
                pageStatusCache[String(currentPage)] = {
                    status: 'translating',
                    progress_stage: '번역 준비 중...',
                    model: model,
                };
                updateRightPanel();
            }).catch(function(err) {
                alert('번역 시작 실패: ' + err.message);
                $translateBtn.disabled = false;
            });
        });

        $cancelBtn.addEventListener('click', function() {
            if (!currentDocId) return;
            if (!confirm('번역을 취소하시겠습니까?')) return;

            fetch(API + '/api/translator/translate/' + currentDocId + '/page/' + currentPage + '/cancel', {
                method: 'POST',
                credentials: 'include',
            }).then(function() {
                delete pageStatusCache[String(currentPage)];
                stopPolling();
                updateRightPanel();
            });
        });

        // ── Polling ──

        function startPolling() {
            stopPolling();
            pollingTimer = setInterval(function() {
                if (!currentDocId) { stopPolling(); return; }

                fetch(API + '/api/translator/translate/' + currentDocId + '/page/' + currentPage + '/status', {
                    credentials: 'include',
                }).then(function(r) { return r.json(); })
                  .then(function(ps) {
                    pageStatusCache[String(currentPage)] = ps;
                    if (ps.status === 'translating') {
                        // 진행 단계 업데이트
                        var stage = ps.progress_stage || '번역 중...';
                        var textEl = $rightPlaceholder.querySelector('.placeholder-text');
                        if (textEl) textEl.textContent = stage;
                        $toolbarStatus.textContent = stage;
                    } else {
                        // 완료/에러
                        stopPolling();
                        updateRightPanel();
                    }
                }).catch(function() {
                    stopPolling();
                });
            }, 3000);
        }

        function stopPolling() {
            if (pollingTimer) {
                clearInterval(pollingTimer);
                pollingTimer = null;
            }
        }

        // ── Page navigation ──

        function updatePageNav() {
            $pageInfo.textContent = currentPage + ' / ' + totalPages;
            $pagePrev.disabled = currentPage <= 1;
            $pageNext.disabled = currentPage >= totalPages;
        }

        $pagePrev.addEventListener('click', function() {
            if (currentPage > 1) goToPage(currentPage - 1);
        });
        $pageNext.addEventListener('click', function() {
            if (currentPage < totalPages) goToPage(currentPage + 1);
        });

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            stopPolling();
            currentPage = page;
            updatePageNav();

            // Left: 원문 렌더링
            renderLeftPage(currentPage);
            $panelLeft.scrollTop = 0;

            // Right: 상태에 따라 표시
            if (rightPdfDoc && hasLegacyTranslation && !pageStatusCache[String(currentPage)]) {
                // 레거시 PDF 유지, 해당 페이지 렌더링
                $rightPlaceholder.style.display = 'none';
                $rightContainer.style.display = 'inline-block';
                renderRightPage(currentPage);
                updateToolbarForStatus('legacy');
            } else {
                // 페이지별 상태 확인 → 서버에서 갱신
                fetch(API + '/api/translator/translate/' + currentDocId + '/page/' + currentPage + '/status', {
                    credentials: 'include',
                }).then(function(r) { return r.json(); })
                  .then(function(ps) {
                    pageStatusCache[String(currentPage)] = ps;
                    updateRightPanel();
                }).catch(function() {
                    updateRightPanel();
                });
            }

            $panelRight.scrollTop = 0;
        }

        // ── Keyboard shortcuts ──
        document.addEventListener('keydown', function(e) {
            if (!currentDocId) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
            if (e.key === 'ArrowLeft') goToPage(currentPage - 1);
            if (e.key === 'ArrowRight') goToPage(currentPage + 1);
        });

        // ── Zoom ──
        $zoomLevel.addEventListener('click', function() {
            zoom = 1.0;
            $zoomLevel.textContent = '100%';
            rerenderBothPanels();
        });
        $zoomIn.addEventListener('click', function() {
            zoom = Math.min(ZOOM_MAX, zoom + ZOOM_STEP);
            $zoomLevel.textContent = Math.round(zoom * 100) + '%';
            rerenderBothPanels();
        });
        $zoomOut.addEventListener('click', function() {
            zoom = Math.max(ZOOM_MIN, zoom - ZOOM_STEP);
            $zoomLevel.textContent = Math.round(zoom * 100) + '%';
            rerenderBothPanels();
        });

        function rerenderBothPanels() {
            renderLeftPage(currentPage);
            // Right: 상태에 따라
            var ps = pageStatusCache[String(currentPage)];
            var status = ps ? ps.status : 'pending';
            if (status === 'done') {
                renderRightPage(1);
            } else if (hasLegacyTranslation && status === 'pending' && rightPdfDoc) {
                renderRightPage(currentPage);
            }
        }

        // ── Resize handler ──
        var resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                if (currentDocId) rerenderBothPanels();
            }, 200);
        });

        // ══════════════════════════════════════
        // Utility
        // ══════════════════════════════════════

        function escHtml(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function formatDate(iso) {
            try {
                var d = new Date(iso);
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0') + ' ' +
                    String(d.getHours()).padStart(2, '0') + ':' +
                    String(d.getMinutes()).padStart(2, '0');
            } catch(e) { return iso; }
        }

    })();
    </script>
</body>
</html>
